name: "CI: schema replay + SQL correctness"

# Two gates on one throwaway Postgres, hermetic (no secrets, never touches prod):
#
# 1. SCHEMA REPLAY — applies the full migrations/ chain (001 -> latest) to a fresh
#    PostGIS container in numeric order under ON_ERROR_STOP, catching a migration
#    that does not apply cleanly before it reaches the production Supabase database
#    (there is no staging DB). It pre-creates the Supabase roles the migrations
#    GRANT to (anon / authenticated / service_role) + pg_trgm via
#    ci_db_bootstrap.sql, and installs pgvector into the container so the guarded
#    clip/embedding objects (migration 226) actually get built — giving a schema
#    that matches prod's shape.
#
# 2. SQL CORRECTNESS — with that real schema in place, PREPAREs every SQL statement
#    the runtime code executes (auto-discovered by tests/sql_corpus.py) against it.
#    PREPARE parses + name-resolves + type-checks each query WITHOUT running it, so
#    a missing/renamed column, an illegal construct (e.g. count(DISTINCT) OVER), a
#    syntax error, or a bad function signature fails the PR — the class the fake DB
#    connections in the unit tests structurally cannot catch, and that has shipped
#    to prod. See tests/test_sql_schema_prepare.py.
#
# Advisory until added to branch protection as a required check.

on:
  push:
    paths:
      - "**/*.py"
      - "migrations/**"
      - "scripts/ci_db_bootstrap.sql"
      - "pyproject.toml"
      - ".github/workflows/migrations.yml"
  pull_request:
    paths:
      - "**/*.py"
      - "migrations/**"
      - "scripts/ci_db_bootstrap.sql"
      - "pyproject.toml"
      - ".github/workflows/migrations.yml"
  workflow_dispatch:

jobs:
  schema-and-sql:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v6

      - name: Build + start Postgres (PostGIS + pgvector)
        # Build the image so pgvector is installed at BUILD time — the server
        # binary and every contrib .so (pg_trgm, postgis) then come from one
        # consistent apt transaction and the container starts fresh on that
        # binary. (Installing pgvector into an ALREADY-RUNNING container instead
        # upgrades contrib under the live server -> "undefined symbol" on load.)
        # pgvector must be present so migration 226's clip/embedding objects —
        # referenced by ~10 runtime files — actually build, or the sweep false-fails.
        run: |
          set -euo pipefail
          cat > /tmp/Dockerfile.ci <<'DOCKER'
          FROM postgis/postgis:15-3.4
          # Install server + PostGIS + pgvector in ONE apt transaction so the
          # binary and every contrib .so land at the same (newest) 15.x minor —
          # a partial upgrade is what triggers "undefined symbol" on load.
          RUN apt-get update \
            && apt-get install -y --no-install-recommends \
                 postgresql-15 postgresql-15-postgis-3 postgresql-15-pgvector \
            && rm -rf /var/lib/apt/lists/*
          DOCKER
          docker build -t ci-postgis-pgvector -f /tmp/Dockerfile.ci /tmp
          docker run -d --name ci-pg -e POSTGRES_PASSWORD=postgres -p 5432:5432 ci-postgis-pgvector
          for _ in $(seq 1 45); do
            if docker exec ci-pg pg_isready -U postgres -h localhost >/dev/null 2>&1; then break; fi
            sleep 2
          done
          docker exec ci-pg pg_isready -U postgres -h localhost

      - name: Bootstrap roles + extensions
        run: psql -v ON_ERROR_STOP=1 -f scripts/ci_db_bootstrap.sql

      - name: Apply migrations in numeric order
        run: |
          set -euo pipefail
          for f in $(ls migrations/*.sql | sort); do
            echo ">>> applying $f"
            psql -v ON_ERROR_STOP=1 -q -f "$f"
          done

      - name: Sanity check (key relations exist + queryable)
        run: |
          psql -v ON_ERROR_STOP=1 \
            -c "select 'listings'::regclass, 'listing_snapshots'::regclass, 'properties'::regclass;" \
            -c "select 'listings_public'::regclass, 'properties_public'::regclass;" \
            -c "select 'image_clip_embeddings'::regclass;" \
            -c "select count(*) as listings_rows from listings;"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python deps (for import-resolved SQL + the sweep)
        run: pip install -e ".[dev,api,geo]"

      - name: PREPARE every SQL statement against the replayed schema
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: pytest tests/test_sql_schema_prepare.py -q
