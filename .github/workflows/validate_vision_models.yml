name: "Jobs: validate vision model/resolution A/B"

# Read-only A/B gate for a dedup-vision (model, max_edge) change, across all three
# forensic lanes (compare / floor_plan / site_plan): RECALL replays historical
# decisive verdicts (does the candidate reproduce them?); PRECISION replays a
# frozen dedup_golden_sets snapshot of confirmed-DIFFERENT pairs (does the
# candidate avoid the lane's dangerous verdict?) when golden_set_name is set.
# Writes NO cache / app_settings — only the standard llm_calls audit rows. Exits
# non-zero (red run) when a configured gate is missed — for a real proposed flip
# that means "don't ship it"; for an exploratory multi-candidate bake-off (the
# Session-3 use of this workflow) a red run on a cheap candidate is an expected,
# informative RESULT — read the printed per-lane numbers in the log, not just the
# run's pass/fail color. See scripts/validate_vision_models.py.
#
# Dispatch-only. Required GitHub secrets (OPENAI_API_KEY / QWEN_API_KEY only
# needed for gpt-* / qwen* candidates — the run fails loud via ProviderError if
# missing, not silently):
#   SUPABASE_DB_URL, ANTHROPIC_API_KEY, GEMINI_API_KEY, OPENAI_API_KEY,
#   QWEN_API_KEY, R2_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY,
#   R2_BUCKET_NAME

on:
  workflow_dispatch:
    inputs:
      candidate_model:
        description: "Candidate model id (e.g. gemini-3.1-flash-lite, gpt-5-mini, qwen3-vl-30b-a3b-instruct)"
        required: true
        default: "claude-haiku-4-5"
        type: string
      lanes:
        description: Comma-separated compare,floor_plan,site_plan (or 'all')
        required: true
        default: "compare,floor_plan,site_plan"
        type: string
      golden_set_name:
        description: "Frozen dedup_golden_sets snapshot for precision checks (blank = skip precision, recall-only)"
        required: false
        default: ""
        type: string
      max_edge:
        description: Compare-lane image long-edge px (768 = comparison tier, 1568 = document tier)
        required: true
        default: "1568"
        type: string
      plan_max_edge:
        description: Floor/site-plan image long-edge px (legibility-sensitive; 1568 = production tier)
        required: true
        default: "1568"
        type: string
      compare_limit:
        description: Max historical compare verdicts to re-run
        required: true
        default: "100"
        type: string
      plan_limit:
        description: Max historical verdicts to re-run PER plan lane (floor_plan and site_plan each)
        required: true
        default: "60"
        type: string
      precision_limit:
        description: Max golden-negative pairs to re-run PER lane (only used when golden_set_name is set)
        required: true
        default: "50"
        type: string
      skip_classify:
        description: Skip the classify-agreement check (compare/floor_plan/site_plan are this session's scope)
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_label:
        description: "Non-empty = PERSIST per-pair results under this label for /model-testing (e.g. 2026-07-13-session3); blank = don't persist"
        required: false
        default: ""
        type: string

concurrency:
  # Key on the candidate model so DIFFERENT models run in PARALLEL (they use different API keys /
  # providers and never contend) — a bake-off of N models finishes in one run's wall-clock, not N.
  # Two dispatches of the SAME model still serialize (same group). cancel-in-progress:false so a
  # re-dispatch queues behind an in-flight measure of that model instead of killing it mid-run.
  group: validate-vision-models-${{ github.event.inputs.candidate_model || 'default' }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 90   # a 100-pair compare sample alone needs >30m; 30 killed runs mid-measure
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Non-Anthropic candidates route by model-id prefix (scripts.validate_vision_models._provider_for):
      # "gemini*" -> api/providers/gemini.py, "gpt-*"/"o1"/"o3"/"o4" -> api/providers/openai.py,
      # "qwen*" -> api/providers/qwen.py (both openai/qwen share api/providers/openai_compatible.py).
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api]"

      - name: Run vision A/B
        run: |
          ARGS="--candidate-model '${{ inputs.candidate_model }}'"
          ARGS="$ARGS --lanes '${{ inputs.lanes }}'"
          ARGS="$ARGS --max-edge ${{ inputs.max_edge }}"
          ARGS="$ARGS --plan-max-edge ${{ inputs.plan_max_edge }}"
          ARGS="$ARGS --compare-limit ${{ inputs.compare_limit }}"
          ARGS="$ARGS --floor-plan-limit ${{ inputs.plan_limit }}"
          ARGS="$ARGS --site-plan-limit ${{ inputs.plan_limit }}"
          ARGS="$ARGS --precision-limit ${{ inputs.precision_limit }}"
          if [ -n "${{ inputs.golden_set_name }}" ]; then
            ARGS="$ARGS --golden-set-name '${{ inputs.golden_set_name }}'"
          fi
          if [ "${{ inputs.skip_classify }}" = "true" ]; then
            ARGS="$ARGS --skip-classify"
          fi
          if [ -n "${{ inputs.run_label }}" ]; then
            ARGS="$ARGS --persist-results --run-label '${{ inputs.run_label }}'"
          fi
          echo "Running with: $ARGS"
          eval python -m scripts.validate_vision_models $ARGS
