name: "Scraping: Českéreality index walk"

# portal: ceskereality
# The fast half of the ceskereality cadence split (architectural rule #19, like
# sreality/idnes). Walks the ENTIRE index of every configured category (no
# --max-pages), touch_listings bumps last_seen on still-listed ids, mark_inactive
# flips delisted ones under the completeness guard (source-scoped), and
# new/price-changed ids are enqueued into listing_detail_queue (source='ceskereality').
# No detail fetch — the drain (ceskereality_detail_drain.yml) consumes the queue.
# Records run_type='index'.
#
# WHY split: ceskereality is large (~49k listings across 12 (category × offer-type)
# walks, ~2500 index pages), so a full index walk takes most of a job's window — a
# combined index+detail run starves the drain. Splitting lets the index complete
# every cycle (so active counts stay accurate) while the drain chips the backlog on
# its own cadence. The polite 0.7 req/s index walk runs ~hour, well inside the
# --max-seconds budget.
#
# Categories + rates live in the `portals` registry row (migration 249); coverage is
# tuned with a SQL update, no workflow edit. Coordinates come from the page, so no
# MAPY_CZ_API_KEY is needed. The client uses an honest identifying User-Agent at a
# polite rate (the site disallows generic bots in robots.txt). Required secret:
# SUPABASE_DB_URL.

on:
  schedule:
    - cron: "25 */6 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: cap index pages per category (ad-hoc partial; suppresses mark_inactive). Blank = full walk.
        required: false
        default: ""
        type: string
      max_seconds:
        description: wall-clock budget; the walk finalizes cleanly before this (blank = 9000 = 150 min).
        required: false
        default: ""
        type: string

concurrency:
  group: ceskereality-index-walk
  cancel-in-progress: false

jobs:
  index-walk:
    runs-on: ubuntu-latest
    # The full walk completes well inside the --max-seconds budget (9000 = 150 min);
    # the budget makes it finalize CLEANLY on a slow/grown day instead of being
    # SIGKILLed, and this timeout is the generous outer backstop. Don't re-tune the
    # timeout to the walk size — the --max-seconds clean-stop keeps it drift-proof.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run ceskereality index walk
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MAX_PAGES: ${{ inputs.max_pages }}
          MAX_SECONDS: ${{ inputs.max_seconds || '9000' }}
        run: |
          ARGS="--index-only --max-seconds $MAX_SECONDS"
          if [ -n "$MAX_PAGES" ]; then ARGS="$ARGS --max-pages $MAX_PAGES"; fi
          echo "python -m scraper.ceskereality_main $ARGS"
          eval "python -m scraper.ceskereality_main $ARGS"
