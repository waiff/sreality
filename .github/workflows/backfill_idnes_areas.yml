name: Backfill idnes areas (spaced-thousands truncation)

# One-off, dispatch-only backfill for PR #686's parser fix: idnes titles render
# land area with a Czech spaced-thousands group ("2 403 m²") and the old
# _AREA_RE matched from inside the number, storing area_m2=403 for a 2,403 m²
# plot (~8.4k active rows). Re-parses each affected listing from its
# already-staged detail HTML (portal_raw_pages, NO re-fetch of idnes) and heals
# the area columns in place; only NULLs a price on a genuine per-m² masquerade
# (zero found in prod). Idempotent + resumable; rerun until "pending=0".
# NOT a portal ingest workflow, so it carries no `# portal:` tag.
#
# Required GitHub secrets: SUPABASE_DB_URL.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Max listings processed per run
        required: false
        default: "40000"
        type: string
      max_seconds:
        description: Wall-clock budget in seconds (blank = no budget)
        required: false
        default: ""
        type: string
      dry_run:
        description: Report the pending count and exit without writing
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: backfill-idnes-areas
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Backfill areas
        run: |
          ARGS="--limit ${{ inputs.limit || '40000' }}"
          if [ -n "${{ inputs.max_seconds }}" ]; then ARGS="$ARGS --max-seconds ${{ inputs.max_seconds }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python -m scripts.backfill_idnes_areas $ARGS
