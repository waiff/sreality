name: Dedup — CLIP image tagging (sharded)

# Backfills image_clip_tags: the self-hosted CLIP zero-shot tag per stored image
# (free replacement for the paid room classifier on the coarse dedup-relevant
# tags, and the FIRST tagger for dum/pozemek/komercni). ACTIVE-listing images
# first; idempotent + resumable (a tagged image drops out of the next select).
# Horizontally sharded into 4 parallel jobs (image_id %% 4), each with its own
# runner + cap, like images.yml. Installs CPU torch + the `clip` extra
# (transformers); the production CLIP could move to int8-ONNX later as an
# optimization. NOT a portal ingest job (untagged, portal: null).
#
# Required secrets: SUPABASE_DB_URL + the R2_* set (same as compute_image_phash.yml).

on:
  schedule:
    - cron: "40 */2 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: Max images tagged per shard per run
        required: false
        default: "20000"
        type: string
      workers:
        description: Parallel R2 downloads
        required: false
        default: "16"
        type: string
      dry_run:
        description: Report the pending count and exit without tagging
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: clip-tag
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (CPU torch + clip extra)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[clip]"

      - name: Tag images
        run: |
          ARGS="--limit ${{ inputs.limit || '20000' }} --workers ${{ inputs.workers || '16' }} --shard ${{ matrix.shard }} --shards 4"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python -m scripts.clip_tag_backfill $ARGS
