name: "Scraping: fresh-listing image fast lane"

# Low-latency image fetch for the NEWEST active listings across ALL portals, so
# a freshly-scraped card renders a photo within minutes instead of waiting for
# the 2-hourly sharded backlog drain (images.yml). The frontend can only show an
# image once its bytes are in R2 (storage_path set) — original portal URLs are
# hotlink/expiry-protected — so racing those URLs on fresh listings is also what
# prevents the image loss we already saw (~43k+ sreality images lost to expiry).
#
# Scope: --images-active-only orders by newest image id first, so new listings'
# photos drain ahead of everything else. Small per-run cap sized to EXIT CLEANLY
# inside the short timeout. The deep + inactive backlog stays with images.yml.
#
# Near-continuous: on success WITH work remaining, the run re-dispatches itself
# (the proven SCRAPE_CHAIN_TOKEN pattern from scrape.yml) so units run back to
# back. When the fresh queue is empty it does NOT chain (no hot loop); the every
# 15-min cron restarts the chain when new listings arrive. The cron is also the
# bootstrap — a brand-new workflow_dispatch only resolves once it's on `main`.
#
# Overlap with images.yml's newest-active slice is harmless: mark_image_stored
# is idempotent and record_images guards on storage_path IS NULL.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      max_image_downloads:
        description: "Override per-run cap (blank = 2500)"
        required: false
        type: string
      image_workers:
        description: "Override concurrent workers (blank = 32)"
        required: false
        type: string

concurrency:
  group: images-fresh
  cancel-in-progress: false

jobs:
  fresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # well above one unit's runtime, below 2x the 15-min cron
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Fresh image drain (active, newest-first)
        id: drain
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          MAX_IMG="${{ inputs.max_image_downloads }}"
          if [ -z "$MAX_IMG" ]; then MAX_IMG="2500"; fi
          WORKERS="${{ inputs.image_workers }}"
          if [ -z "$WORKERS" ]; then WORKERS="32"; fi
          ARGS="--images-only --images-active-only --max-image-downloads $MAX_IMG --image-workers $WORKERS"
          echo "Running with: $ARGS"
          # Capture python's own exit code through the tee pipe, record how many
          # images this unit attempted (drives the chain decision), then exit
          # with python's code so suspicious-stop (rc 75) / failures don't chain.
          set +e
          python -m scraper.main $ARGS 2>&1 | tee /tmp/img_fresh.log
          RC=${PIPESTATUS[0]}
          set -e
          ATTEMPTED=$(grep -oE 'attempted=[0-9]+' /tmp/img_fresh.log | tail -1 | cut -d= -f2 || true)
          echo "attempted=${ATTEMPTED:-0}" >> "$GITHUB_OUTPUT"
          exit $RC

      # Re-dispatch for back-to-back cadence only when there was work to do.
      - name: Chain next run (near-continuous)
        if: ${{ success() && steps.drain.outputs.attempted != '0' && steps.drain.outputs.attempted != '' }}
        env:
          CHAIN_TOKEN: ${{ secrets.SCRAPE_CHAIN_TOKEN }}
        run: |
          if [ -z "$CHAIN_TOKEN" ]; then
            echo "SCRAPE_CHAIN_TOKEN not set — fresh lane stays cron-driven (every 15 min)."
            exit 0
          fi
          echo "Re-dispatching images_fresh.yml (attempted=${{ steps.drain.outputs.attempted }} > 0)."
          curl -sS -X POST \
            -H "Authorization: Bearer $CHAIN_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/images_fresh.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"
