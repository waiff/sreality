name: Jobs - ingest RÚIAN address points

# Refreshes the local `address_points` mirror from the ČÚZK RÚIAN "Adresní místa"
# whole-country structured CSV (~3M points, monthly). Full replace each run. Feeds
# the coordinate->street resolver (resolve_coord_streets.yml). Implements
# docs/design/street-coverage-ruian.md. NOT a portal ingest workflow — no
# `# portal:` tag.
#
# Required GitHub secret: SUPABASE_DB_URL.

on:
  workflow_dispatch:
    inputs:
      date:
        description: strukt_ADR file date YYYYMMDD (blank = latest month-end)
        required: false
        default: ""
        type: string
      dry_run:
        description: Download + parse, report counts, write nothing
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "30 3 3 * *"   # 03:30 UTC on the 3rd — a few days after the month-end file is published

concurrency:
  group: ingest-address-points
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e .
      - name: Ingest RÚIAN address points
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ]; then ARGS="$ARGS --date ${{ inputs.date }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python -m scripts.ingest_address_points $ARGS
