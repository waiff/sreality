name: "Dedup engine (vision batch warm-up)"

# Async dedup-vision via the Anthropic Message Batches API (50% cheaper than the
# synchronous dedup engine's per-call vision, recall-identical). PRE-WARMS the
# engine's classify/compare/site_plan caches; the daily "Dedup engine
# (street + disposition)" run then REPLAYS unchanged over the warm caches and
# produces the identical merges for free. Two modes, selected by the `mode`
# dispatch input:
#
#   submit  — run the engine's FREE funnel (rules A/B/C + pHash + cross-source
#             gate) and enqueue the cross-source pairs' classify/compare/site_plan
#             requests as size-bounded batches (scripts.submit_dedup_batch). Two
#             waves fall out across runs: classify first, then compare/site_plan
#             once classify ingests. Does NO merges.
#   ingest  — poll in-flight batches; on completion, write each result to its
#             cache (the same row the sync tool writes) + one llm_calls row at the
#             50% batch-discounted cost (scripts.ingest_dedup_batch). Idempotent.
#
# This is a source-agnostic cost optimization, not a portal ingest — left
# untagged (no `# portal:` line) so it appears in Settings > Workflows, not any
# one portal's pipeline panel.
#
# TARGETED re-enable (Phase 4.1, 2026-07): the first warmer was retired because an
# all-rooms pre-buy is mostly wasted by a stop-at-first-High replay (79-93% of its
# compare requests never drove a decision). The submit lane now warms only the
# FIRST-PRIORITY room per pair (--warm-rooms 1) — the room the engine tries first
# and stops at on a merge — plus the would-merge floor plan, dropping the tail-room
# over-buy while still discounting the decisive room at 50%. The crons are restored
# but the master gate dedup_batch_warmer_enabled is STILL false by default, so
# scheduled runs stay no-ops until the operator flips it; a one-off warm/ingest is
# also one click via workflow_dispatch.
#
# Required GitHub secrets: SUPABASE_DB_URL, ANTHROPIC_API_KEY, and R2_* (submit
# downloads image bytes to build the vision requests).

on:
  schedule:
    - cron: "0 */6 * * *"   # submit: enqueue the next slice of first-priority-room warm-ups
    - cron: "30 * * * *"    # ingest: poll + persist completed batches
  workflow_dispatch:
    inputs:
      mode:
        description: "submit a new batch, or ingest completed ones"
        required: true
        default: "ingest"
        type: choice
        options:
          - "ingest"
          - "submit"
      max_pairs:
        description: "[submit] Max visual candidate pairs examined per run"
        required: false
        default: "4000"
        type: string
      max_requests:
        description: "[submit] Cap total vision requests enqueued per run"
        required: false
        default: "1500"
        type: string
      max_room_attempts:
        description: "[submit] The engine's per-pair room cap (upper bound on warm-rooms)"
        required: false
        default: "4"
        type: string
      warm_rooms:
        description: "[submit] Like-room compares warmed per pair (1 = first-priority room only)"
        required: false
        default: "1"
        type: string
      lane:
        description: "[submit] Population to warm: street funnel, geo funnel, or 'candidates' (the proposed review-queue pairs — the blitz population)"
        required: false
        default: "street"
        type: choice
        options:
          - "street"
          - "geo"
          - "candidates"
      dry_run:
        description: "[submit] Report what would be enqueued without submitting"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: dedup-batches
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    # 75 = the collect() time budget (max-seconds 3000 = 50 min) + pip/setup +
    # the flush/submit tail. At 60, 3 of 6 Jul-10 submits were killed mid-run.
    timeout-minutes: 75
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[api]"

      - name: Run batch step
        run: |
          # Scheduled triggers pass no inputs; pick mode from which cron fired.
          MODE="${{ inputs.mode }}"
          if [ -z "$MODE" ]; then
            if [ "${{ github.event.schedule }}" = "0 */6 * * *" ]; then
              MODE="submit"
            else
              MODE="ingest"
            fi
          fi

          if [ "$MODE" = "submit" ]; then
            ARGS="--max-pairs ${{ inputs.max_pairs || '4000' }}"
            ARGS="$ARGS --max-requests ${{ inputs.max_requests || '1500' }}"
            ARGS="$ARGS --max-room-attempts ${{ inputs.max_room_attempts || '4' }}"
            ARGS="$ARGS --warm-rooms ${{ inputs.warm_rooms || '1' }}"
            ARGS="$ARGS --lane ${{ inputs.lane || 'street' }}"
            if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
            echo "submit with: $ARGS"
            python -m scripts.submit_dedup_batch $ARGS
          else
            echo "ingest in-flight batches"
            python -m scripts.ingest_dedup_batch
          fi
