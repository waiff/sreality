name: "Dedup engine (vision batch flush)"

# Async dedup-vision via the provider Batch APIs (Anthropic or OpenAI — 50%
# cheaper than the synchronous dedup engine's per-call vision, recall-identical).
# Engine-fed deferral (dedup-cost-reduction.md §4.1): the dedup engine itself
# (scripts.dedup_engine, gated by app_settings.dedup_engine_batch_defer_enabled)
# spools a cold classify/compare/site-plan/floor-plan call it would otherwise pay
# for inline into dedup_batch_requests (batch_id NULL) instead of calling the LLM,
# and defers the pair; the engine's OWN next pass replays over the now-warm cache.
# This workflow does NOT decide what to warm (that guesswork — the old
# collect()-based pre-warmer — was retired: a second process re-deriving the
# engine's work-list could only ever approximate it). Two modes, selected by the
# `mode` dispatch input:
#
#   submit  — flush whatever the engine has spooled: chunk unsubmitted requests
#             per-provider under the size/count caps and submit each chunk as one
#             Batch API call (scripts.submit_dedup_batch). Does NO merges, touches
#             no R2 bytes (the engine already built the request at defer time).
#   ingest  — poll in-flight batches; on completion, write each result to its
#             cache (the same row the sync tool writes) + one llm_calls row at the
#             50% batch-discounted cost (scripts.ingest_dedup_batch). Idempotent.
#
# This is a source-agnostic cost optimization, not a portal ingest — left
# untagged (no `# portal:` line) so it appears in Settings > Workflows, not any
# one portal's pipeline panel.
#
# Required GitHub secrets: SUPABASE_DB_URL, ANTHROPIC_API_KEY, OPENAI_API_KEY —
# whichever the spooled requests' models resolve to.

on:
  schedule:
    - cron: "0 */6 * * *"   # submit: flush whatever the engine has spooled
    - cron: "30 * * * *"    # ingest: poll + persist completed batches
  workflow_dispatch:
    inputs:
      mode:
        description: "submit (flush the spool), or ingest completed batches"
        required: true
        default: "ingest"
        type: choice
        options:
          - "ingest"
          - "submit"
      max_requests:
        description: "[submit] Max spooled requests to flush per run"
        required: false
        default: "3000"
        type: string
      dry_run:
        description: "[submit] Report what would be submitted without flushing"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: dedup-batches
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    # The flush step is now pure DB + provider-submit (no R2 fetch, no funnel
    # traversal — the engine already built every request at defer time), so this
    # runs in minutes; the generous timeout is a backstop, not a real budget.
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # A lane flipped to gpt-5-mini submits/ingests via OpenAI's batch tier.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[api]"

      - name: Run batch step
        run: |
          # Scheduled triggers pass no inputs; pick mode from which cron fired.
          MODE="${{ inputs.mode }}"
          if [ -z "$MODE" ]; then
            if [ "${{ github.event.schedule }}" = "0 */6 * * *" ]; then
              MODE="submit"
            else
              MODE="ingest"
            fi
          fi

          if [ "$MODE" = "submit" ]; then
            ARGS="--max-requests ${{ inputs.max_requests || '3000' }}"
            if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
            echo "submit (flush spool) with: $ARGS"
            python -m scripts.submit_dedup_batch $ARGS
          else
            echo "ingest in-flight batches"
            python -m scripts.ingest_dedup_batch
          fi
