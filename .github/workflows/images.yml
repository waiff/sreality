name: "Scraping: Sreality image backlog drain"

# THE image-download workflow. Images are fully decoupled from the scrape
# (scrape.yml is index + detail only), so this is the single owner of all
# image downloading — both newest active listings and the deep INACTIVE/
# historical backlog. Runs the image-download phase only, every 2 hours.
#
# Configured for the operator's spec:
#   * Drains ALL pending images by default (active + inactive); tick
#     images_active_only to restrict to active listings only. The selection
#     orders active listings first, so fresh listings get pictures soonest.
#   * --max-image-downloads defaults to a BOUNDED per-run cap (see the run
#     step) so each run exits cleanly inside the timeout instead of draining
#     a huge backlog to a SIGKILL. Per-image commits mean progress is never
#     lost; the next tick continues. Override to 0 to drain-to-empty on demand.
#     The suspicious-stop heuristic (transient-failure rate > 30% over the last
#     100 outcomes) still bails early if sreality's CDN starts blocking.
#   * --image-workers 32 — dial via workflow_dispatch if the CDN throttles.
#   * Concurrency group `images-backfill` with cancel-in-progress
#     false. If a still-draining run is in flight when the next 2h
#     cron tick arrives, the new run queues and succeeds the old one.
#
# Image failures that look like the parent listing was taken down
# trigger an inline freshness check, which flips the listing to
# is_active = false AND bulk-marks its remaining images as
# unavailable_reason = 'listing_taken_down'. Those outcomes do NOT
# count toward the suspicious-stop ratio.

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours, on the hour
  workflow_dispatch:
    inputs:
      max_image_downloads:
        description: "Override images-per-run cap (blank = 0 = drain to empty / suspicious-stop)"
        required: false
        type: string
      image_workers:
        description: "Override concurrent workers (blank = 32)"
        required: false
        type: string
      images_active_only:
        description: "Restrict to active listings only. Default false: drain the full backlog incl. inactive (the hourly scrape already covers active)."
        required: false
        type: boolean
        default: false

concurrency:
  group: images-backfill
  cancel-in-progress: false

jobs:
  images:
    runs-on: ubuntu-latest
    timeout-minutes: 110   # under the 2h cron interval so we never overlap ourselves
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run image-download phase
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          MAX_IMG="${{ inputs.max_image_downloads }}"
          if [ -z "$MAX_IMG" ]; then
            # Bounded so the run EXITS CLEANLY within the 110-min timeout instead
            # of draining-to-empty against a huge backlog and being SIGKILLed
            # ("cancelled"). Per-image commits mean progress is never lost either
            # way; a clean exit just keeps the run-history honest and frees the
            # runner. Sized below measured throughput; the next 2-hourly tick
            # continues the drain. Override to 0 to drain-to-empty on demand.
            MAX_IMG="40000"
          fi
          WORKERS="${{ inputs.image_workers }}"
          if [ -z "$WORKERS" ]; then
            WORKERS="32"
          fi
          ARGS="--images-only --max-image-downloads $MAX_IMG --image-workers $WORKERS"
          # Default (scheduled / unticked) drains the full backlog incl.
          # inactive; only restrict when the operator explicitly ticks it.
          if [ "${{ inputs.images_active_only }}" = "true" ]; then
            ARGS="$ARGS --images-active-only"
          fi

          echo "Running with: $ARGS"
          python -m scraper.main $ARGS
