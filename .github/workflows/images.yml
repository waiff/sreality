name: Sreality image backlog drain

# Three extra runs per day that only execute the image-download phase
# (no scrape, no condition scoring). The daily scrape.yml run already
# does up to 50 000 images at 22:00 UTC; this workflow drains the
# remaining backlog (~995k untouched rows as of this writing) by
# adding ~120k more downloads per day across three runs.
#
# Spaced away from the 22:00 scrape window and from each other so
# they don't fight for the same DB / sreality / R2 budget.
# Combined daily throughput target: ~150k successful uploads/day.
# Expected drain time at 95% success: ~7 days; at 50% success: ~14 days.
#
# Worker count stays at 16. Per recent observation, sreality's CDN
# throttles unpredictably (success rate ranged from 46% to 100%);
# raising workers risks making this worse. If success rate falls below
# 40% across two consecutive runs, drop WORKERS via workflow_dispatch.

on:
  schedule:
    - cron: "0 4 * * *"
    - cron: "0 10 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      max_image_downloads:
        description: "Override images-per-run cap (blank = 40000)"
        required: false
        type: string
      image_workers:
        description: "Override concurrent workers (blank = 16)"
        required: false
        type: string

jobs:
  images:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run image-download phase
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          MAX_IMG="${{ inputs.max_image_downloads }}"
          if [ -z "$MAX_IMG" ]; then
            MAX_IMG="40000"
          fi
          WORKERS="${{ inputs.image_workers }}"
          if [ -z "$WORKERS" ]; then
            WORKERS="16"
          fi

          echo "Running with: --images-only --max-image-downloads $MAX_IMG --image-workers $WORKERS"
          python -m scraper.main --images-only --max-image-downloads $MAX_IMG --image-workers $WORKERS
