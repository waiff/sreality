name: Sreality image backlog drain

# Backfill workflow that runs only the image-download phase every 2
# hours. Pairs with scrape.yml (which now also drains to empty after
# the nightly index walk) to keep "missed images" close to zero.
#
# Configured for the operator's spec:
#   * --images-active-only so the cap-bounded slice goes to listings
#     users can still browse — active is the user-visible coverage gap.
#   * --max-image-downloads 0 → no cap; the loop drains until either
#     the queue is empty or the suspicious-stop heuristic in
#     scraper.main._run_image_downloads fires (transient-failure rate
#     > 30% over the last 100 outcomes). On suspicious stop the next
#     2-hourly cron tick picks up.
#   * --image-workers 32 — moderate bump from the historical 16. The
#     suspicious-stop heuristic gives us early warning if the higher
#     concurrency makes sreality's CDN throttle harder; dial back via
#     workflow_dispatch if it does.
#   * Concurrency group `images-backfill` with cancel-in-progress
#     false. If a still-draining run is in flight when the next 2h
#     cron tick arrives, the new run queues and succeeds the old one.
#
# Image failures that look like the parent listing was taken down
# trigger an inline freshness check, which flips the listing to
# is_active = false AND bulk-marks its remaining images as
# unavailable_reason = 'listing_taken_down'. Those outcomes do NOT
# count toward the suspicious-stop ratio.

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours, on the hour
  workflow_dispatch:
    inputs:
      max_image_downloads:
        description: "Override images-per-run cap (blank = 0 = drain to empty / suspicious-stop)"
        required: false
        type: string
      image_workers:
        description: "Override concurrent workers (blank = 32)"
        required: false
        type: string
      images_active_only:
        description: "Restrict to active listings (default true). Untick to drain inactive backlog too."
        required: false
        type: boolean
        default: true

concurrency:
  group: images-backfill
  cancel-in-progress: false

jobs:
  images:
    runs-on: ubuntu-latest
    timeout-minutes: 110   # under the 2h cron interval so we never overlap ourselves
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run image-download phase
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          MAX_IMG="${{ inputs.max_image_downloads }}"
          if [ -z "$MAX_IMG" ]; then
            MAX_IMG="0"
          fi
          WORKERS="${{ inputs.image_workers }}"
          if [ -z "$WORKERS" ]; then
            WORKERS="32"
          fi
          ARGS="--images-only --max-image-downloads $MAX_IMG --image-workers $WORKERS"
          if [ "${{ inputs.images_active_only }}" != "false" ]; then
            ARGS="$ARGS --images-active-only"
          fi

          echo "Running with: $ARGS"
          python -m scraper.main $ARGS
