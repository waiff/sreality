name: "Scraping: image backlog drain (sharded)"

# THE backlog image-download workflow. Images are fully decoupled from every
# portal's crawl (the crawls only record image-URL rows; this job uploads the
# bytes to R2), so this is the owner of the deep backlog across ALL portals
# (sreality, idnes, bazos, bezrealitky, maxima, mmreality). Source-agnostic.
#
# Horizontally sharded: the single ~11k img/hr drainer could not keep pace with
# 5-portal inflow (~14k/hr) on top of a ~900k backlog, so the queue grew and
# fresh listings rendered imageless. This runs the image phase as N=4 parallel
# jobs, each owning the `image_id mod 4 == shard` slice (--image-shard k/4), for
# ~4x throughput with no cross-job coordination. The near-real-time fresh fast
# lane (images_fresh.yml) owns new-listing latency separately.
#
#   * Default drains ALL pending images (active + inactive); the selection
#     orders active listings first so what's left of the fresh gap drains first.
#   * Per-shard --max-image-downloads is sized to EXIT CLEANLY inside the
#     110-min timeout (so scrape_run finalize runs, no orphaned/stuck rows)
#     rather than being SIGKILLed. Per-image commits mean progress is never lost;
#     the next 2-hourly tick continues the drain. Override to 0 to drain-to-empty.
#   * Each shard has its OWN suspicious-stop circuit-breaker (transient-failure
#     rate > 30% over its last 100 outcomes) and its own runner IP, so per-IP
#     request rate stays at today's proven level — only aggregate load rises.
#   * Per-shard concurrency group with cancel-in-progress false: a still-draining
#     shard is never killed mid-run; the next tick queues behind it.
#
# Image failures that look like the parent listing was taken down trigger an
# inline freshness check, which flips the listing inactive AND bulk-marks its
# remaining images unavailable. Those outcomes do NOT count toward suspicious-stop.

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours, on the hour
  workflow_dispatch:
    inputs:
      max_image_downloads:
        description: "Override per-shard images-per-run cap (blank = 18000; 0 = drain to empty / suspicious-stop)"
        required: false
        type: string
      image_workers:
        description: "Override concurrent workers per shard (blank = 32)"
        required: false
        type: string
      images_active_only:
        description: "Restrict to active listings only. Default false: drain the full backlog incl. inactive (the fresh fast lane already covers new actives)."
        required: false
        type: boolean
        default: false

jobs:
  images:
    strategy:
      fail-fast: false        # one shard's CDN hiccup must not cancel the others
      max-parallel: 4
      matrix:
        shard: [0, 1, 2, 3]
    runs-on: ubuntu-latest
    timeout-minutes: 110   # under the 2h cron interval so we never overlap ourselves
    # Per-shard group so the 4 shards run in parallel, but a single shard never
    # overlaps its own previous (still-draining) run.
    concurrency:
      group: images-backfill-${{ matrix.shard }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run image-download phase (shard ${{ matrix.shard }}/4)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          MAX_IMG="${{ inputs.max_image_downloads }}"
          if [ -z "$MAX_IMG" ]; then
            # Sized BELOW one shard's measured ~11k/hr × ~100 min so the run
            # finishes the cap and exits cleanly (finalize runs) well before the
            # 110-min timeout. 4 shards × 18000 ≈ 72k per 2h tick ≈ 36k/hr
            # aggregate — comfortably above the ~14k/hr inflow, so the ~900k
            # backlog drains over ~1.5-2 days, then stays cleared.
            MAX_IMG="18000"
          fi
          WORKERS="${{ inputs.image_workers }}"
          if [ -z "$WORKERS" ]; then
            WORKERS="32"
          fi
          ARGS="--images-only --max-image-downloads $MAX_IMG --image-workers $WORKERS --image-shard ${{ matrix.shard }}/4"
          if [ "${{ inputs.images_active_only }}" = "true" ]; then
            ARGS="$ARGS --images-active-only"
          fi

          echo "Running with: $ARGS"
          python -m scraper.main $ARGS

  # Refresh the Health "Image mirror" matview ONCE after all shards finish,
  # rather than 4x concurrently (REFRESH takes an exclusive lock). always() so
  # the stats stay fresh even if some shards bailed early — the counts moved.
  refresh-stats:
    needs: images
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e .
      - name: Refresh image-storage stats matview
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python -m scripts.refresh_image_stats
