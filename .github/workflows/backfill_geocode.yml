name: "Jobs: backfill geocode coordinates (any portal, from stored locality)"

# DISPATCH-ONLY backfill for the standing no-coords stock of any portal (default:
# idnes, realitymix, maxima, remax, mmreality, ceskereality — bazos is excluded,
# its coords need the link-corroborating tree in backfill_bazos_coords). Geocodes
# each row's STORED locality via the persistent geocode_cache (migration 288) and
# stamps listings.geocode_attempted_at on every processed row (placed or not), so
# the pool self-empties and re-runs are cheap — re-dispatch until pending=0.
# Writes geom only (triggers derive hierarchy + dedup cell); no snapshots.
# Supersedes the completed one-off backfill_realitymix_coords.
#
# Required secrets: SUPABASE_DB_URL + MAPY_CZ_API_KEY (+ MAPY2 backup). No Mapy key -> no-op.

on:
  workflow_dispatch:
    inputs:
      source:
        description: single portal source to process (blank = all default sources)
        required: false
        default: ""
        type: string
      limit:
        description: max listings processed this run (blank = 20000)
        required: false
        default: ""
        type: string
      max_seconds:
        description: wall-clock budget; stops claiming + exits cleanly (blank = none)
        required: false
        default: ""
        type: string
      dry_run:
        description: "report the pending count and exit without writing"
        required: false
        default: false
        type: boolean

concurrency:
  # OWN group (NOT any drain's): the backfill targets STABLE geom-NULL rows while
  # drains process the new/price-changed queue — disjoint sets — and the drains'
  # carry-forward makes any rare overlap self-healing (the realitymix-backfill
  # precedent: sharing a drain group starved the backfill for days).
  group: geocode-coords-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run geocode coords backfill
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MAPY_CZ_API_KEY: ${{ secrets.MAPY_CZ_API_KEY }}
          MAPY2_CZ_API_KEY: ${{ secrets.MAPY2_CZ_API_KEY }}
          SOURCE: ${{ inputs.source }}
          LIMIT: ${{ inputs.limit }}
          MAX_SECONDS: ${{ inputs.max_seconds }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ARGS=""
          if [ -n "$SOURCE" ]; then ARGS="$ARGS --source $SOURCE"; fi
          if [ -n "$LIMIT" ]; then ARGS="$ARGS --limit $LIMIT"; fi
          if [ -n "$MAX_SECONDS" ]; then ARGS="$ARGS --max-seconds $MAX_SECONDS"; fi
          if [ "$DRY_RUN" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "python -m scripts.backfill_geocode_coords $ARGS"
          eval "python -m scripts.backfill_geocode_coords $ARGS"
