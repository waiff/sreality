name: Broker resolution (full sweep + backfill)

# Broker intelligence: the daily full-sweep reconcile + the one-shot backfill.
# Re-attributes EVERY sreality listing from raw_json (keyset-batched so the
# raw_json scan never times out over the pooler), recomputes all rollups, rebuilds
# firm memberships + firm counts, runs the cross-source merge step, REFRESHes the
# leaderboard matview, and clears the dirty queue — the self-healing backstop for
# anything the */10 incremental pass missed. Runs after the property recompute
# (04:15) so property_id is fresh for property_count. mode=backfill is the same
# code path (the first population); dispatch it once after this lands on main.
# Source-agnostic — no `# portal:` tag. Shares the broker-resolution concurrency
# group with the incremental job.
#
# Required secret: SUPABASE_DB_URL.

on:
  schedule:
    - cron: "35 4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: full | backfill (same code path; backfill = first population)
        required: false
        default: "full"
        type: choice
        options:
          - "full"
          - "backfill"
      max_seconds:
        description: Wall-clock budget for the attribution scan; finalize cleanly before timeout
        required: false
        default: "3000"
        type: string

concurrency:
  group: broker-resolution
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[api]"
      - name: Resolve brokers (full sweep)
        run: |
          ARGS="--max-seconds ${{ inputs.max_seconds || '3000' }}"
          if [ "${{ inputs.mode }}" = "backfill" ]; then ARGS="$ARGS --backfill"; fi
          echo "python -m scripts.resolve_brokers $ARGS"
          python -m scripts.resolve_brokers $ARGS
