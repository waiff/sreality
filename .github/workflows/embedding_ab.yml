name: "Dedup — embedding A/B (DINOv2 vs CLIP)"

# One-shot OFFLINE analysis (read-only, no merges/writes): does a candidate instance-biased
# embedding (DINOv2) separate same-property from different-unit-same-development where CLIP's
# semantic embedding collapsed (negatives cosine >= positives)? Reports max same-room cosine
# percentiles by is_same for DINOv2 vs the stored CLIP, on the labelled same-disposition set
# (floor-plan-confirmed different units as negatives). The gate before any re-embed commitment.
# Dispatch-only. Secrets: SUPABASE_DB_URL + R2_* (downloads image bytes). NOT a portal ingest.

on:
  workflow_dispatch:
    inputs:
      model:
        description: "HF image model id (DINOv2 CLS embedding)"
        required: false
        default: "facebook/dinov2-small"
        type: string
      npos:
        description: "Positive (same-property) pairs sampled"
        required: false
        default: "400"
        type: string
      nneg:
        description: "Negative (different-unit) pairs sampled"
        required: false
        default: "400"
        type: string

jobs:
  ab:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      HF_HUB_DOWNLOAD_TIMEOUT: "60"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Cache Hugging Face weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-dinov2-small
      - name: Install (CPU torch + torchvision + clip extra)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[clip]"
      - name: Run embedding A/B
        run: |
          python -m scripts.embedding_ab \
            --model "${{ inputs.model || 'facebook/dinov2-small' }}" \
            --npos "${{ inputs.npos || '400' }}" \
            --nneg "${{ inputs.nneg || '400' }}"
