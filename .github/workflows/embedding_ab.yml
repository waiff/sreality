name: "Dedup — embedding A/B (DINOv2 vs CLIP)"

# One-shot OFFLINE analysis (read-only, no merges/writes): does a candidate instance-biased
# embedding (DINOv2) separate same-property from different-unit-same-development where CLIP's
# semantic embedding collapsed (negatives cosine >= positives)? Two modes:
#   ab       — legacy CPU A/B (scripts/embedding_ab.py): DINOv2-small vs stored CLIP,
#              byt-only, percentiles in the job log.
#   manifest — build the GPU-bench manifest (scripts/build_embedding_manifest.py):
#              labelled pairs from dedup_label_events + presigned R2 URLs, uploaded as a
#              1-day artifact for scripts/embedding_gpu_bench.py on an external GPU box.
#              The presigned URLs grant 7-day public read on the sampled listing photos —
#              hence the short artifact retention on this public repo.
# Dispatch-only. Secrets: SUPABASE_DB_URL + R2_*. NOT a portal ingest.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "ab = CPU A/B in-log; manifest = build GPU-bench manifest artifact"
        required: false
        default: "ab"
        type: choice
        options:
          - ab
          - manifest
      model:
        description: "HF image model id (DINOv2 CLS embedding; ab mode only)"
        required: false
        default: "facebook/dinov2-small"
        type: string
      npos:
        description: "Positive (same-property) pairs sampled (ab mode only)"
        required: false
        default: "400"
        type: string
      nneg:
        description: "Negative (different-unit) pairs sampled (ab mode only)"
        required: false
        default: "400"
        type: string
      families:
        description: "Comma-separated logical tags for the manifest (manifest mode only; empty = builder default)"
        required: false
        default: ""
        type: string

jobs:
  ab:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      HF_HUB_DOWNLOAD_TIMEOUT: "60"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Cache Hugging Face weights
        if: ${{ (inputs.mode || 'ab') == 'ab' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-dinov2-small
      - name: Install (CPU torch + torchvision + clip extra)
        if: ${{ (inputs.mode || 'ab') == 'ab' }}
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[clip]"
      - name: Run embedding A/B
        if: ${{ (inputs.mode || 'ab') == 'ab' }}
        run: |
          python -m scripts.embedding_ab \
            --model "${{ inputs.model || 'facebook/dinov2-small' }}" \
            --npos "${{ inputs.npos || '400' }}" \
            --nneg "${{ inputs.nneg || '400' }}"
      - name: Install (manifest mode — no torch)
        if: ${{ inputs.mode == 'manifest' }}
        run: pip install -e "."
      - name: Build manifest
        if: ${{ inputs.mode == 'manifest' }}
        run: |
          if [ -n "${{ inputs.families }}" ]; then
            python -m scripts.build_embedding_manifest --out embedding_manifest.json \
              --families "${{ inputs.families }}"
          else
            python -m scripts.build_embedding_manifest --out embedding_manifest.json
          fi
      - name: Upload manifest artifact
        if: ${{ inputs.mode == 'manifest' }}
        uses: actions/upload-artifact@v4
        with:
          name: embedding-manifest
          path: embedding_manifest.json
          retention-days: 1
