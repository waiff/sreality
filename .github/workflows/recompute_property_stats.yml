name: "Jobs: recompute property stats (daily full reconcile)"

# DAILY FULL SWEEP for the canonical `properties` parent. Attaches any straggler
# unlinked listings (incl. the one-time native-id backfill), then recomputes
# EVERY property's is_active rollup, source / site counts, first/last-seen span,
# representative child, current price, and the price-history aggregates (drop /
# rise counts, max drop %) from the union of its children's snapshots. Finally it
# clears the dirty_properties queue (everything was just recomputed).
#
# As of Phase 3 this is the RECONCILE BACKSTOP, not the live path: the fast,
# frequent dirty-set incremental pass (property_maintenance.yml, cron */5) keeps
# `properties` near-real-time by recomputing only the properties the writers
# queued. This full sweep runs once a day to recompute everything from scratch,
# so any enqueue the writers missed self-heals within 24h. O(all properties), so
# it must NOT run frequently at scale.
#
# Decision #3: the property is_active rollup lives here / in the incremental
# pass, NOT in the scraper's mid-walk mark_inactive, so a cross-source rollup
# never races a per-category flip.
#
# Idempotent + resumable: autocommit means each property-id batch commits
# independently, so a timeout or cancel preserves completed batches and the
# next run simply recomputes from current state.
#
# Cadence: daily (04:15 UTC), before the street+disposition dedup engine
# (dedup_engine at 04:45) so property stats are fresh when it runs. Tune the
# cron below or trigger manually from the Actions tab.
#
# Required GitHub secret:
#   SUPABASE_DB_URL  -- same one used by every other workflow.

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:
    inputs:
      batch_size:
        description: Properties recomputed per statement
        required: true
        default: "2000"
        type: string
      dry_run:
        description: Report straggler + dirty + property counts and exit without writing
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: sreality-property-maintenance
  cancel-in-progress: false

jobs:
  recompute:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "psycopg[binary]>=3.2"

      - name: Run recompute
        run: |
          ARGS="--batch-size ${{ inputs.batch_size || '2000' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m scripts.recompute_property_stats $ARGS
