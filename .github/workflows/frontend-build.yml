name: Frontend build

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-build.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-build-only
      - name: Bundle size budget
        run: |
          du -sh dist
          gzipped=$(find dist/assets -name '*.js' -exec gzip -c {} \; | wc -c)
          echo "Total JS gzipped: $gzipped bytes"
          if [ "$gzipped" -gt 512000 ]; then
            echo "::warning::JS bundle exceeds 500kB gzipped budget ($gzipped bytes)"
          fi
