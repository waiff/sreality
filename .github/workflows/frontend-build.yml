name: Frontend build

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-build.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-build-only
      - name: Bundle size budget
        run: |
          du -sh dist
          # Initial chunk = what loads before any lazy import. Lazy chunks
          # (maplibre, recharts) only count when their route is opened.
          initial=$(gzip -c dist/assets/index-*.js | wc -c)
          echo "Initial JS chunk gzipped: $initial bytes"
          for f in dist/assets/*.js; do
            sz=$(gzip -c "$f" | wc -c)
            printf '  %-50s %10s bytes gzip\n' "$(basename "$f")" "$sz"
          done
          if [ "$initial" -gt 512000 ]; then
            echo "::warning::Initial JS chunk exceeds 500 kB gzipped budget ($initial bytes)"
          fi
