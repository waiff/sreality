name: Tier-2 dedup sweep (multi-portal)

# Cross-source dedup sweep (multi-portal dedup PR3). Finds property pairs the
# cheap insert-time Tier-1 matcher missed -- the same real-world property listed
# on two portals whose coords/area/price differ enough to slip Tier-1's tight
# gate -- scores each through a confidence ladder (disposition equivalence ->
# address similarity -> pHash [PR5] -> vision), then auto-merges the
# high-confidence few (reversible + audited) and queues the rest for the /dedup
# review UI. CROSS-SOURCE ONLY: same-portal pairs are legitimately distinct
# units and never touched.
#
# Cadence: daily, after the hourly recompute so property stats are fresh.
# Inert until a second portal (bazos) lands rows at scale -- with sreality-only
# data there are no cross-source pairs, so the sweep finds nothing.
#
# Vision has a small default budget (max_vision_calls=50): the free pHash rung is
# the primary path, and the bounded vision calls settle image-identity candidates
# whose photos pHash couldn't compare yet (a side still unhashed). The
# max_vision_calls cap bounds the worst-case LLM spend per run; set it to 0 to run
# pHash-only.
#
# Required GitHub secret: SUPABASE_DB_URL. Vision additionally needs an LLM key
# (ANTHROPIC_API_KEY / GEMINI_API_KEY) + R2_* for image bytes; absent these the
# vision rung degrades to a logged no-op and pHash carries the sweep.

on:
  schedule:
    - cron: "45 3 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: Max candidate pairs generated per run
        required: false
        default: "2000"
        type: string
      max_auto_merges:
        description: Cap auto-merges per run (overflow is queued)
        required: false
        default: "200"
        type: string
      max_vision_calls:
        description: Vision calls cap (settles image-identity pairs pHash can't; 0 = free)
        required: false
        default: "50"
        type: string
      dry_run:
        description: Report candidate-pair count and exit without writing
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: dedup-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[api]"

      - name: Run dedup sweep
        run: |
          ARGS="--limit ${{ inputs.limit || '2000' }}"
          ARGS="$ARGS --max-auto-merges ${{ inputs.max_auto_merges || '200' }}"
          ARGS="$ARGS --max-vision-calls ${{ inputs.max_vision_calls || '50' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "python -m scripts.dedup_sweep $ARGS"
          python -m scripts.dedup_sweep $ARGS
