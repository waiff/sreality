name: "Scraping: Bazos crawler (pilot)"

# portal: bazos
# Scheduled (hourly) + manual crawler for reality.bazos.cz. Runs the shared
# portal framework (Phase 4): an index walk that stages raw pages, bumps
# last_seen on still-listed ads (touch_listings), enqueues new + price-changed
# ads into the shared listing_detail_queue, and — under the completeness guard
# (architectural rule #3) — marks delisted ads inactive. A detail drain then
# fetches a bounded slice of the queue, parses it, and ingests through
# db.ingest_scraped_listing (Tier-0 idempotency + Tier-1 property matching).
#
# Required secrets: SUPABASE_DB_URL. Optional: MAPY_CZ_API_KEY enables
# text-first, cross-checked coordinate resolution (street geocode beats the
# coarse maps-link pin); without it the crawl falls back to the CZ-guarded link.
#
# Cadence: hourly. The full index walk is cheap (it re-fetches no detail — only
# new/price-changed ads enqueue) and bazos has NO deep-pagination cap (unlike
# sreality), so one nationwide walk reaches every page (~355 pages / ~7k ads at
# ~2s/page ≈ 12 min) — no per-region split needed. It surfaces new ads +
# freshness every hour. The riskier index-absence delisting sweep is throttled
# inside BazosPortal to once per 12h (portals.inactive_sweep_min_interval_hours,
# migration 113), so a single rate-limited walk can never mass-delist. The detail
# drain is bounded per run (--max-detail) and the queue persists, so the ~7k
# initial backfill spreads over ~a day of hourly runs without losing work.
#
# Scope (scheduled default): every scope in the portal registry — nationwide
# prodam/byt (apartments for sale) + pronajmu/byt (apartments for rent). The
# drain reads each ad's category off its detail-page breadcrumb, so one queue +
# one drain cover both. workflow_dispatch overrides every knob (--sale-type +
# --category narrow to one scope; locality+radius_km scope to a region).

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      sale_type:
        description: prodam (sale) or pronajmu (rent)
        type: choice
        default: prodam
        options: [prodam, pronajmu]
      category:
        description: bazos category segment
        type: choice
        default: byt
        options: [byt, dum, pozemky, nebytove, ostatni]
      locality:
        description: locality filter (e.g. Praha); blank = nationwide
        required: false
        default: ""
        type: string
      radius_km:
        description: radius around locality in km (blank = none)
        required: false
        default: ""
        type: string
      max_pages:
        description: cap index pages walked (blank = full walk)
        required: false
        default: ""
        type: string
      max_detail:
        description: cap detail-drain claims this run (blank = drain the queue)
        required: false
        default: ""
        type: string

concurrency:
  group: bazos-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run bazos crawl
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MAPY_CZ_API_KEY: ${{ secrets.MAPY_CZ_API_KEY }}
          # inputs.* are empty on a scheduled run. With no --sale-type/--category
          # the crawler walks EVERY scope in the portal registry (nationwide
          # prodam/byt + pronajmu/byt); a dispatch can narrow to one scope.
          SALE_TYPE: ${{ inputs.sale_type }}
          CATEGORY: ${{ inputs.category }}
          LOCALITY: ${{ inputs.locality }}
          RADIUS_KM: ${{ inputs.radius_km }}
          MAX_PAGES: ${{ inputs.max_pages }}
          # Bound the drain so the initial backfill spreads across hourly runs and
          # stays inside the timeout; the queue persists between runs. A detail
          # fetch costs ~3.4s (rate limit + per-listing geocoding), so ~400/run is
          # ~23m of drain; with the ~15m two-scope index walk that's ~38m, under
          # the 50m timeout.
          MAX_DETAIL: ${{ inputs.max_detail || '400' }}
        run: |
          ARGS="--workers 2 --rate 0.6"
          if [ -n "$SALE_TYPE" ]; then ARGS="$ARGS --sale-type $SALE_TYPE"; fi
          if [ -n "$CATEGORY" ]; then ARGS="$ARGS --category $CATEGORY"; fi
          if [ -n "$LOCALITY" ]; then ARGS="$ARGS --locality '$LOCALITY'"; fi
          if [ -n "$RADIUS_KM" ]; then ARGS="$ARGS --radius-km $RADIUS_KM"; fi
          if [ -n "$MAX_PAGES" ]; then ARGS="$ARGS --max-pages $MAX_PAGES"; fi
          if [ -n "$MAX_DETAIL" ]; then ARGS="$ARGS --max-detail $MAX_DETAIL"; fi
          echo "python -m scraper.bazos_main $ARGS"
          eval "python -m scraper.bazos_main $ARGS"
