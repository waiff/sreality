name: "Scraping: Bazos crawler combined walk (fallback)"

# portal: bazos
# DISPATCH-ONLY combined index+detail fallback for reality.bazos.cz, mirroring
# sreality's scrape.yml and idnes's scrape_idnes.yml. The scheduled pipeline is
# the cadence SPLIT — the full bazos_index_walk.yml (walk + mark_inactive +
# enqueue) feeds the bounded bazos_detail_drain.yml — because bazos now walks 14
# nationwide scopes (~1500 index pages, ~50 min) and a single combined run can't
# do both inside one job (the full index eats the window, starving the drain).
#
# This combined entry point stays for ad-hoc NARROW runs (e.g. -f sale_type=prodam
# -f category=dum, or a localized -f locality=Praha -f radius_km=20) and small
# validation passes (-f max_pages=2, which suppresses mark_inactive). For a full
# nationwide run use the split workflows — a combined full walk would re-create
# the timeout. One job runs the index walk then a bounded detail drain via
# bazos_main. No schedule — re-add a `schedule:` cron here to revert to a combined
# cadence if ever needed.
#
# Writes 'index' + 'detail' scrape_runs rows under source='bazos'. Required secret:
# SUPABASE_DB_URL; optional MAPY_CZ_API_KEY enables street-geocoded coordinates.

on:
  workflow_dispatch:
    inputs:
      sale_type:
        description: prodam (sale) or pronajmu (rent); blank = every configured scope
        required: false
        default: ""
        type: choice
        options: ["", prodam, pronajmu]
      category:
        description: bazos category segment; blank = every configured scope
        required: false
        default: ""
        type: choice
        options: ["", byt, dum, chata, restaurace, kancelar, prostory, sklad]
      locality:
        description: locality filter (e.g. Praha); blank = nationwide
        required: false
        default: ""
        type: string
      radius_km:
        description: radius around locality in km (blank = none)
        required: false
        default: ""
        type: string
      max_pages:
        description: cap index pages per scope (blank = full walk)
        required: false
        default: ""
        type: string
      max_detail:
        description: cap detail-drain claims this run (blank = drain the queue)
        required: false
        default: "400"
        type: string

concurrency:
  group: bazos-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run bazos crawl
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MAPY_CZ_API_KEY: ${{ secrets.MAPY_CZ_API_KEY }}
          SALE_TYPE: ${{ inputs.sale_type }}
          CATEGORY: ${{ inputs.category }}
          LOCALITY: ${{ inputs.locality }}
          RADIUS_KM: ${{ inputs.radius_km }}
          MAX_PAGES: ${{ inputs.max_pages }}
          MAX_DETAIL: ${{ inputs.max_detail || '400' }}
        run: |
          ARGS="--workers 2 --rate 0.6"
          if [ -n "$SALE_TYPE" ]; then ARGS="$ARGS --sale-type $SALE_TYPE"; fi
          if [ -n "$CATEGORY" ]; then ARGS="$ARGS --category $CATEGORY"; fi
          if [ -n "$LOCALITY" ]; then ARGS="$ARGS --locality '$LOCALITY'"; fi
          if [ -n "$RADIUS_KM" ]; then ARGS="$ARGS --radius-km $RADIUS_KM"; fi
          if [ -n "$MAX_PAGES" ]; then ARGS="$ARGS --max-pages $MAX_PAGES"; fi
          if [ -n "$MAX_DETAIL" ]; then ARGS="$ARGS --max-detail $MAX_DETAIL"; fi
          echo "python -m scraper.bazos_main $ARGS"
          eval "python -m scraper.bazos_main $ARGS"
