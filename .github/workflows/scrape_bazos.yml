name: "Scraping: Bazos crawler (pilot)"

# Scheduled (every 6h) + manual crawler for reality.bazos.cz (multi-portal
# slice 3b). Walks one
# bazos category's index, fetches each listing detail, stages the raw HTML in
# portal_raw_pages, parses it, and ingests through db.ingest_scraped_listing
# (Tier-0 idempotency + Tier-1 property matching).
#
# This is NOT a sreality scrape: it writes NO scrape_runs row and does not
# touch sreality liveness / reconciliation. A one-category crawl is a partial
# walk, so the orchestrator never runs mark_inactive (architectural rule #3).
#
# Required secrets: SUPABASE_DB_URL. Optional: MAPY_CZ_API_KEY enables
# text-first, cross-checked coordinate resolution (street geocode beats the
# coarse maps-link pin); without it the crawl falls back to the CZ-guarded link.
#
# Cadence: a conservative every-6h schedule (offset off the hourly recompute's
# :00 so a crawl's Tier-1 attaches are picked up by the next recompute within
# the hour). A scheduled run has no workflow inputs, so the run step falls back
# to prodam/byt (the roadmap's pilot scope) bounded by --max-pages 2 — small
# enough to stay well inside the 20-min timeout. Widen / shard once the pilot
# proves the full-category run time; workflow_dispatch stays the manual escape
# hatch with its own inputs.

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:
    inputs:
      sale_type:
        description: prodam (sale) or pronajmu (rent)
        type: choice
        default: prodam
        options: [prodam, pronajmu]
      category:
        description: bazos category segment
        type: choice
        default: byt
        options: [byt, dum, pozemky, nebytove, ostatni]
      locality:
        description: locality filter (e.g. Praha); blank = nationwide
        required: false
        default: ""
        type: string
      radius_km:
        description: radius around locality in km (blank = none)
        required: false
        default: ""
        type: string
      max_pages:
        description: cap index pages walked (pilot safety)
        required: false
        default: "2"
        type: string

concurrency:
  group: bazos-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run bazos crawl
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MAPY_CZ_API_KEY: ${{ secrets.MAPY_CZ_API_KEY }}
          # inputs.* are empty on a scheduled run, so fall back to the pilot scope.
          SALE_TYPE: ${{ inputs.sale_type || 'prodam' }}
          CATEGORY: ${{ inputs.category || 'byt' }}
          LOCALITY: ${{ inputs.locality }}
          RADIUS_KM: ${{ inputs.radius_km }}
          MAX_PAGES: ${{ inputs.max_pages || '2' }}
        run: |
          ARGS="--sale-type $SALE_TYPE --category $CATEGORY"
          if [ -n "$LOCALITY" ]; then ARGS="$ARGS --locality '$LOCALITY'"; fi
          if [ -n "$RADIUS_KM" ]; then ARGS="$ARGS --radius-km $RADIUS_KM"; fi
          if [ -n "$MAX_PAGES" ]; then ARGS="$ARGS --max-pages $MAX_PAGES"; fi
          echo "python -m scraper.bazos_main $ARGS"
          eval "python -m scraper.bazos_main $ARGS"
