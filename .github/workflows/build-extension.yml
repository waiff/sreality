name: "CI: build Chrome extension"

# Builds the chrome-extension/ bundle and uploads dist/ as a workflow
# artifact you can download from the Actions tab. Keeps the build off
# the operator's laptop (no local Node install needed).
#
# Secrets required on the repository:
#   EXT_API_BASE_URL  →  same value as the Railway FastAPI URL
#   EXT_API_TOKEN     →  same value as API_TOKEN on the Railway service
# Add them at Settings → Secrets and variables → Actions → New
# repository secret. The build inlines them into the bundle at build
# time (Path 1 — see chrome-extension/README.md).

on:
  push:
    branches: [main]
    paths:
      - 'chrome-extension/**'
      - '.github/workflows/build-extension.yml'
  pull_request:
    paths:
      - 'chrome-extension/**'
      - '.github/workflows/build-extension.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chrome-extension
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Type-check
        run: npm run type-check
      - name: Build
        run: npm run build
        env:
          # Empty fallbacks let PRs from forks (no secret access) still
          # build the bundle — the runtime warns on startup and the
          # operator sees a clear "API base URL not configured" message.
          VITE_API_BASE_URL: ${{ secrets.EXT_API_BASE_URL }}
          VITE_API_TOKEN: ${{ secrets.EXT_API_TOKEN }}
          # SPA base URL for the "Otevřít v aplikaci" link. Optional — empty → link hidden.
          VITE_APP_BASE_URL: ${{ secrets.EXT_APP_BASE_URL }}
      - name: Stamp build metadata
        run: |
          cat > dist/build-info.json <<EOF
          {
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "run_id": "${{ github.run_id }}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
      - name: Upload extension artifact
        uses: actions/upload-artifact@v7
        with:
          name: chrome-extension-dist
          path: chrome-extension/dist
          if-no-files-found: error
          retention-days: 30
