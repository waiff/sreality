name: "Monitoring: LLM pipeline liveness"

# The hourly LLM lane of verify_pipeline: runs ONLY the two llm_* checks
# (llm_errors + llm_liveness) at a fast cadence, and exits non-zero when either is
# `fail` so GitHub emails the operator on a red scheduled run. This is the
# belt-and-braces channel for when the in-app bell path itself is down; the bell
# itself is rung (edge-triggered) by the checks via emit_transition_alerts, so a
# credit/silence incident alerts once — not per run — and clears on recovery.
#
# Replaces the standalone scripts/check_llm_health.py (WS4 alerting rebuild): one
# detection codepath, two cadences (this hourly lane + the 6h full verify run),
# one bell namespace — no more duplicate llm_health vs llm_errors alerts.
#
# Read-only; needs ONLY SUPABASE_DB_URL — deliberately not the Anthropic key, so it
# keeps working when the API is the thing that's down.
#
# Required GitHub secret: SUPABASE_DB_URL.

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

concurrency:
  group: llm-health
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Check LLM pipeline liveness (errors + silence)
        run: python -m scripts.verify_pipeline --only llm_errors,llm_liveness --exit-nonzero-on-fail
