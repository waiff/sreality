name: "Monitoring: LLM pipeline liveness"

# Goes red (→ GitHub notifies the operator on a failed scheduled run) when the
# LLM pipeline looks dead: no `llm_calls` rows for several hours while there is
# pending condition-scoring work. Catches the silent failure mode where the
# Anthropic account runs out of credits / the key breaks and the scorers
# swallow per-listing errors, staying green while scoring nothing (this went
# unnoticed for ~8h on 2026-06-04).
#
# Read-only; needs ONLY SUPABASE_DB_URL — deliberately not the Anthropic key,
# so it keeps working when the API is the thing that's down. Tunable via
# LLM_HEALTH_MAX_IDLE_HOURS (default 4) / LLM_HEALTH_MIN_PENDING (default 50) /
# LLM_HEALTH_CONDITION_MAX_IDLE_HOURS (default 8, condition-scoring liveness).
#
# Required GitHub secret: SUPABASE_DB_URL.

on:
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:

concurrency:
  group: llm-health
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "psycopg[binary]>=3.2"

      - name: Check LLM pipeline liveness
        run: python -m scripts.check_llm_health
