name: Backfill bazos street + locality

# One-off, dispatch-only backfill. Persists `street` + `locality` on active
# bazos listings that are missing either: re-parses each from its already-staged
# detail HTML (portal_raw_pages, NO re-fetch of bazos) with the current parser —
# the one that surfaces the extracted street on ScrapedListing and carries the
# PR #406 locality fix — and fills the columns in place. Runs the parser with NO
# geocoder, so there is zero Mapy.cz spend and geom is untouched. Populating
# `street` is what makes bazos rows eligible for the street+disposition dedup
# engine. Idempotent + resumable (each row stamped raw_json.street_locality_backfill);
# rerun until "pending=0". NOT a portal ingest workflow, so it carries no
# `# portal:` tag.
#
# Required GitHub secret: SUPABASE_DB_URL.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Max listings processed per run
        required: false
        default: "40000"
        type: string
      max_seconds:
        description: Wall-clock budget in seconds (blank = no budget)
        required: false
        default: ""
        type: string
      dry_run:
        description: Report the pending count and exit without writing
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: backfill-bazos-street-locality
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Backfill street + locality
        run: |
          ARGS="--limit ${{ inputs.limit || '40000' }}"
          if [ -n "${{ inputs.max_seconds }}" ]; then ARGS="$ARGS --max-seconds ${{ inputs.max_seconds }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python -m scripts.backfill_bazos_street_locality $ARGS
