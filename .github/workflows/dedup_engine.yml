name: Dedup engine (street + disposition)

# Street + disposition keyed dedup engine. Groups listings that share a street
# and disposition into one real-world property, autonomously. Replaces the old
# geo-proximity Tier-2 sweep. Rules: (A) only listings with BOTH a street and a
# disposition are eligible; (B) same street + house number + disposition + floor
# auto-merges (with a 5% area guard); (C) same street + disposition with no
# contradicting floor/area/house-number becomes a visual candidate; (D) the
# visual layer confirms — >=2 near-identical interior photos (pHash), else a
# room-aware forensic comparison stopping at the first High verdict — and merges
# on confirmation; (E) everything else is queued for the operator's /dedup page.
#
# Every auto-merge is reversible (property_merge_events ledger + one-click Undo).
# A per-run dedup_engine_runs row powers the /dedup automation dashboard.
#
# Cadence: every 6h. The SCHEDULED run is FREE-mostly (--free): pHash +
# exact-address merges + reconcile + reject/gate dismissals; un-vision'd
# cross-source pairs are skipped (not queued as placeholders). It captures every
# dup that SHARES a photo (pHash, whose coverage keeps growing) plus all free
# cleanup. The ONE bounded paid call is the floor-plan validation gate
# (--free-floor-plan-budget 120): a single Sonnet floor-plan check on the SMALL set
# of pairs the engine WOULD merge (pHash matches / visual Highs), so both-plan
# duplicates auto-confirm / auto-dismiss instead of piling onto the manual queue
# (the all-rooms compare/classify stays off; that's the expensive part). Beyond the
# budget, both-plan pairs DEFER to the next run. Different-photo dups still need the
# dispatch forensic compare below.
#
# Paid all-rooms VISION is dispatch-only: workflow_dispatch with max_vision_calls>0
# runs the forensic compare (stop-at-first-High; warm cache hits are free via the
# cold-only budget), cache_only=true does a $0 consume of already-warmed verdicts,
# shadow=true previews with no writes, free=true + a raised free_floor_plan_budget is
# a compare-free floor-plan sweep. (The dedup_batches warmer is disabled — for
# stop-at-first-High dedup the engine's own sync is cheaper than all-rooms batch
# warming.)
#
# Required GitHub secret: SUPABASE_DB_URL; paid vision additionally needs
# ANTHROPIC_API_KEY + R2_* for image bytes.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      max_pairs:
        description: Max visual candidate pairs examined per run
        required: false
        default: "4000"
        type: string
      max_vision_calls:
        description: Cap forensic vision calls per run (0 = pHash-only)
        required: false
        default: "400"
        type: string
      max_room_attempts:
        description: Max like-room forensic comparisons per candidate pair
        required: false
        default: "4"
        type: string
      max_seconds:
        description: Wall-clock budget; finalize cleanly before the job timeout
        required: false
        default: "4800"
        type: string
      dry_run:
        description: Report eligible counts + street groups and exit without writing
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      shadow:
        description: Run the full pipeline but WRITE NOTHING (preview merge/dismiss/reconcile counts)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      cache_only:
        description: Consume only already-warmed verdicts (no LLM, $0)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      free:
        description: FREE mode — pHash + rule merges + reconcile + bounded inline floor-plan gate only
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      free_floor_plan_budget:
        description: "[free] Inline cold Sonnet floor-plan checks allowed on a free run (0 = cache-only $0). Raise for a one-time compare-free sweep."
        required: false
        default: "120"
        type: string

concurrency:
  group: dedup-engine
  cancel-in-progress: false

jobs:
  engine:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[api]"

      - name: Run dedup engine
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # SCHEDULED = FREE: pHash + rule merges + reconcile, NO paid all-rooms
            # compare/classify, no placeholders. The ONE bounded paid exception is the
            # floor-plan validation gate (--free-floor-plan-budget) — a targeted Sonnet
            # check only on the small set of would-merge both-plan pairs (Option C).
            ARGS="--free --max-pairs 200000 --max-seconds 4800 --free-floor-plan-budget 120"
          else
            # Dispatch: paid vision / cache-only / free / shadow per inputs.
            ARGS="--max-pairs ${{ inputs.max_pairs || '20000' }}"
            ARGS="$ARGS --max-vision-calls ${{ inputs.max_vision_calls || '300' }}"
            ARGS="$ARGS --max-room-attempts ${{ inputs.max_room_attempts || '4' }}"
            ARGS="$ARGS --max-seconds ${{ inputs.max_seconds || '4800' }}"
            ARGS="$ARGS --free-floor-plan-budget ${{ inputs.free_floor_plan_budget || '120' }}"
            if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
            if [ "${{ inputs.shadow }}" = "true" ]; then ARGS="$ARGS --shadow"; fi
            if [ "${{ inputs.cache_only }}" = "true" ]; then ARGS="$ARGS --cache-only"; fi
            if [ "${{ inputs.free }}" = "true" ]; then ARGS="$ARGS --free"; fi
          fi
          echo "python -m scripts.dedup_engine $ARGS"
          python -m scripts.dedup_engine $ARGS
