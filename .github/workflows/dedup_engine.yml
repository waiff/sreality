name: Dedup engine (street + disposition)

# Street + disposition keyed dedup engine. Groups listings that share a street
# and disposition into one real-world property, autonomously. Replaces the old
# geo-proximity Tier-2 sweep. Rules: (A) only listings with BOTH a street and a
# disposition are eligible; (B) same street + house number + disposition + floor
# auto-merges (with a 5% area guard); (C) same street + disposition with no
# contradicting floor/area/house-number becomes a visual candidate; (D) the
# visual layer confirms — >=2 near-identical interior photos (pHash), else a
# room-aware forensic comparison stopping at the first High verdict — and merges
# on confirmation; (E) everything else is queued for the operator's /dedup page.
#
# Every auto-merge is reversible (property_merge_events ledger + one-click Undo).
# A per-run dedup_engine_runs row powers the /dedup automation dashboard.
#
# Cadence: every 6h. The SCHEDULED run is FREE-mostly (--free): pHash merges +
# reconcile + reject/gate dismissals; un-vision'd candidate pairs are skipped
# (not queued as placeholders). It captures every
# dup that SHARES a photo (pHash, whose coverage keeps growing) plus all free
# cleanup. The ONE bounded paid call is the floor-plan validation gate, capped by
# app_settings.dedup_floor_plan_budget (default 10000): a single Sonnet floor-plan
# check on the SMALL set of pairs the engine WOULD merge (pHash matches / visual
# Highs), so both-plan duplicates auto-confirm / auto-dismiss instead of piling onto
# the manual queue (the all-rooms compare/classify stays off; that's the expensive
# part). Beyond the budget, both-plan pairs DEFER to the next run. Different-photo
# dups still need the dispatch forensic compare below.
#
# Paid all-rooms VISION is dispatch-only: workflow_dispatch with max_vision_calls>0
# runs the forensic compare (stop-at-first-High; warm cache hits are free via the
# cold-only budget), cache_only=true does a $0 consume of already-warmed verdicts,
# shadow=true previews with no writes, free=true + a raised floor_plan_budget is
# a compare-free floor-plan sweep. (The dedup_batches warmer is gated by
# app_settings.dedup_batch_warmer_enabled — for stop-at-first-High dedup the engine's
# own sync is cheaper than all-rooms batch
# warming.)
#
# Required GitHub secret: SUPABASE_DB_URL; paid vision additionally needs
# ANTHROPIC_API_KEY + R2_* for image bytes.

on:
  schedule:
    - cron: "0 */6 * * *"    # FULL SCAN (free) — discover new dups across the market
    - cron: "30 */2 * * *"   # CANDIDATE DRAIN (free) — re-decide only the queued candidates
    - cron: "45 * * * *"     # DIRTY DRAIN (free) — real-time, just after the hourly CLIP tag job
    - cron: "0 3,9,15,21 * * *"  # GEO SCAN — single-dwelling (houses/land/commercial), own budget
    - cron: "0 1,7,13,19 * * *"  # BYT-GEO SCAN — street-less apartments (cell+disposition), gated OFF by default
  workflow_dispatch:
    inputs:
      max_pairs:
        description: Max visual candidate pairs examined per run
        required: false
        default: "4000"
        type: string
      max_vision_calls:
        description: Cap forensic vision calls per run (0 = pHash-only)
        required: false
        default: "400"
        type: string
      max_room_attempts:
        description: Max like-room forensic comparisons per candidate pair
        required: false
        default: "4"
        type: string
      max_seconds:
        description: Wall-clock budget; finalize cleanly before the job timeout
        required: false
        default: "4800"
        type: string
      dry_run:
        description: Report eligible counts + street groups and exit without writing
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      shadow:
        description: Run the full pipeline but WRITE NOTHING (preview merge/dismiss/reconcile counts)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      cache_only:
        description: Consume only already-warmed verdicts (no LLM, $0)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      free:
        description: FREE mode — pHash + rule merges + reconcile + bounded inline floor-plan gate only
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      candidates:
        description: Candidate-priority drain — re-decide ONLY the queued /dedup candidates (O(queue), not a full scan)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      dirty:
        description: Real-time dirty drain — re-decide ONLY street groups touching a just-dedup-ready property (typically pair with free=true, like the scheduled run)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      max_dirty:
        description: "[dirty] Bound the claim to the N NEWEST dedup-ready properties — parity with the scheduled run's 3000 (a bare dirty dispatch previously fell to the CLI's 10000). Raise for a one-off backlog blitz."
        required: false
        default: "3000"
        type: string
      geo_only:
        description: GEO scan — single-dwelling (house/land/commercial) only, the geo-proximity path (pair with shadow=true for a volume preview)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      byt_geo_only:
        description: BYT-GEO scan — street-less apartments only (geo cell + disposition, candidate-generation; gated by dedup_byt_geo_enabled)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      floor_plan_budget:
        description: "[free] Override the dedup_floor_plan_budget setting for this run: inline cold Sonnet floor-plan checks allowed (0 = cache-only $0). Empty = use the setting (default 10000)."
        required: false
        default: ""
        type: string
      compare_budget:
        description: "[free] PAID forensic room/site-plan compares allowed this run (cache hits don't count), cosine-routed. 0 = pHash-only free run. Separate budget from floor_plan_budget."
        required: false
        default: ""
        type: string

# The real-time DIRTY drain (:45) gets its OWN concurrency group so the slow batch runs (full
# scan 6h / candidate 2h / geo 4x/day) can never starve or cancel it — the "merge in minutes"
# SLO can't hold if the dirty lane waits behind an 80-min full scan (several dirty runs were
# cancelled by the shared group before this). Safe to run CONCURRENTLY with a batch run:
# merge_properties row-locks both properties FOR UPDATE + gates on status='active', so
# concurrent merges serialize per-property (a redundant re-decide is a cheap no-op via the
# already_merged reject) — the same row-lock safety that already lets dedup run concurrently
# with property-maintenance (a separate group). Everything else stays in the one `dedup-engine`
# group (serialized among the batch runs). workflow_dispatch (empty github.event.schedule)
# falls to the batch group.
concurrency:
  group: dedup-engine${{ github.event.schedule == '45 * * * *' && '-dirty' || '' }}
  cancel-in-progress: false

jobs:
  engine:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # For a forensic lane flipped to gpt-5-mini (sync fallback path). Absent = a
      # clear ProviderError on those calls, never a silent/corrupt merge.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[api]"

      - name: Run dedup engine
        run: |
          if [ "${{ github.event.schedule }}" = "45 * * * *" ]; then
            # SCHEDULED DIRTY DRAIN (free, real-time): re-decide ONLY the street groups
            # touching a just-dedup-ready property (dedup_dirty_properties, filled by the
            # hourly CLIP tag job), so a new cross-portal listing merges within ~minutes of
            # being tagged. Empty queue -> fast no-op.
            #   * --compare-budget 40 (W2): pay-at-decision-time forensic compares so the
            #     real-time lane auto-merges the different-photo cross-portal pairs pHash can't
            #     — capped at 40 PAID (cache-free) calls, cosine-routed (most rooms Haiku/skip),
            #     deadline-bounded. No batch warmer exists anymore, so the compares must run live
            #     here or the SLO's photo-sharing merges never happen on the hot path.
            #   * --floor-plan-budget 25 (was 0): with no warmer to consume from, a cache-only
            #     gate would DEFER every would-merge both-plan pair forever, so the lane pays a
            #     small live floor-plan budget (its OWN, separate from compares — W2). 25 is well
            #     under the ~300 that once blew the 20-min budget; the deadline is the hard stop.
            #   * --max-dirty 3000: a slice small enough that its street-group pair-work fits
            #     the 20-min budget even on a portal-launch spike (the enqueue eligibility+
            #     recency gates keep the steady-state queue far below this). Newest-first claim
            #     + the 24h TTL prune mean the stale tail ages out to the full scan, never pins
            #     the head.
            ARGS="--free --dirty --max-pairs 200000 --max-seconds 1200 --compare-budget 40 --floor-plan-budget 25 --max-dirty 3000"
          elif [ "${{ github.event.schedule }}" = "30 */2 * * *" ]; then
            # SCHEDULED CANDIDATE DRAIN (free): re-decide ONLY the properties in the
            # still-proposed /dedup queue (O(queue), not a market scan), so the queue
            # self-clears regardless of where the 6h full scan's deadline falls.
            #   * --compare-budget 100 (W2): live forensic compares so a queued different-photo
            #     pair auto-merges instead of waiting for an operator; 100 PAID calls, cosine-routed.
            #   * --floor-plan-budget 300: bounded live floor-plan validation (its own budget).
            ARGS="--free --candidates --max-pairs 200000 --max-seconds 2400 --compare-budget 100 --floor-plan-budget 300"
          elif [ "${{ github.event.schedule }}" = "0 3,9,15,21 * * *" ]; then
            # SCHEDULED GEO SCAN (paid, bounded): single-dwelling families (house / land /
            # commercial) have NO disposition, so the street+disposition engine can't touch them
            # — geo-proximity + the forensic FACADE compare is their ONLY path. This is geo's OWN
            # run with its own budget (it was previously bolted onto the street full-scan, where it
            # was deadline-starved, and the candidate drain, where it inherited the apartment
            # restrict → it produced ZERO). NOT --free: the paid facade compare auto-merges confident
            # cross-portal houses (different photos → pHash can't) + enqueues the ambiguous for
            # review, bounded by --max-vision-calls. Gated by the dedup_geo_enabled master switch.
            ARGS="--geo-only --max-pairs 200000 --geo-max-pairs 20000"
            ARGS="$ARGS --max-vision-calls 300 --max-room-attempts 4 --max-seconds 4800 --floor-plan-budget 300"
          elif [ "${{ github.event.schedule }}" = "0 1,7,13,19 * * *" ]; then
            # SCHEDULED BYT-GEO SCAN (paid, bounded): street-less apartments blocked on geo
            # cell + disposition — the rung that makes ~19.3k byt reachable that neither the
            # street pass (no street) nor the geo pass (byt excluded by design) can touch.
            # CANDIDATE-GENERATION ONLY: classify_byt_geo_pair never auto-merges; pHash (with
            # byt render-exclusion) / forensic High are the only merge gates, so the bounded
            # vision budget below is what auto-resolves the photo-sharing cross-portal pairs
            # and the rest queue as tier='byt_geo'. Offset from the geo run's hours; serialized
            # with the other batch runs by the shared concurrency group. Gated by the
            # dedup_byt_geo_enabled master switch (registry default OFF — the run exits
            # immediately until the operator flips it after the migration-290 backfill).
            ARGS="--byt-geo-only --max-pairs 200000 --geo-max-pairs 20000"
            ARGS="$ARGS --max-vision-calls 300 --max-room-attempts 4 --max-seconds 4800 --floor-plan-budget 300"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            # SCHEDULED FULL SCAN = FREE: pHash + rule merges + reconcile + market discovery.
            #   * --compare-budget 300 (W2): live forensic compares on the new different-photo
            #     cross-portal candidates the scan discovers, capped at 300 PAID (cache-free)
            #     calls, cosine-routed — the pay-at-decision-time replacement for the retired
            #     batch warmer. Its own pool, independent of the floor-plan budget below.
            #   * floor-plan validation gate: capped by app_settings.dedup_floor_plan_budget
            #     (default 10000) on its OWN separate budget — a targeted Sonnet check only on
            #     would-merge both-plan pairs (so a large plan budget can't inflate compare spend).
            ARGS="--free --max-pairs 200000 --max-seconds 4800 --compare-budget 300"
          else
            # Dispatch: paid vision / cache-only / free / shadow / candidates per inputs.
            ARGS="--max-pairs ${{ inputs.max_pairs || '20000' }}"
            ARGS="$ARGS --max-vision-calls ${{ inputs.max_vision_calls || '300' }}"
            ARGS="$ARGS --max-room-attempts ${{ inputs.max_room_attempts || '4' }}"
            ARGS="$ARGS --max-seconds ${{ inputs.max_seconds || '4800' }}"
            if [ -n "${{ inputs.floor_plan_budget }}" ]; then ARGS="$ARGS --floor-plan-budget ${{ inputs.floor_plan_budget }}"; fi
            if [ -n "${{ inputs.compare_budget }}" ]; then ARGS="$ARGS --compare-budget ${{ inputs.compare_budget }}"; fi
            if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
            if [ "${{ inputs.shadow }}" = "true" ]; then ARGS="$ARGS --shadow"; fi
            if [ "${{ inputs.cache_only }}" = "true" ]; then ARGS="$ARGS --cache-only"; fi
            if [ "${{ inputs.free }}" = "true" ]; then ARGS="$ARGS --free"; fi
            if [ "${{ inputs.candidates }}" = "true" ]; then ARGS="$ARGS --candidates"; fi
            if [ "${{ inputs.dirty }}" = "true" ]; then ARGS="$ARGS --dirty --max-dirty ${{ inputs.max_dirty || '3000' }}"; fi
            if [ "${{ inputs.geo_only }}" = "true" ]; then ARGS="$ARGS --geo-only"; fi
            if [ "${{ inputs.byt_geo_only }}" = "true" ]; then ARGS="$ARGS --byt-geo-only"; fi
          fi
          echo "python -m scripts.dedup_engine $ARGS"
          python -m scripts.dedup_engine $ARGS
