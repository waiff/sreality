name: "Scraping: M&M Reality scraper (pilot)"

# portal: mmreality
# Scheduled scraper for mmreality.cz on the shared portal framework. M&M Reality
# is a server-rendered HTML portal whose detail pages embed a complete structured
# estate object (a Vue `:property` prop): the index walk pages the mixed-category
# /nemovitosti/ results and enqueues new/price-changed ids into
# listing_detail_queue, then the detail drain fetches each listing page, decodes
# its :property JSON to a ScrapedListing, and ingests through
# db.ingest_scraped_listing (Tier-0 idempotency + Tier-1 property matching).
#
# RESIDENTIAL EGRESS: mmreality's Cloudflare edge HARD-403s our datacenter
# (GitHub-Actions) IP on the first request — it ingested ZERO listings across its
# first 101 (blocked) runs. So every request routes through the residential proxy
# in SCRAPER_PROXY_URL (MmRealityClient.USE_PROXY), the same egress the sister
# CF-blocked portal (ceskereality) uses. With a residential exit IP the site
# returns 200. Required secrets: SUPABASE_DB_URL, SCRAPER_PROXY_URL.
#
# The index is a single MIXED-category feed (no per-category slice) AND exposes no
# result-total, so it can't be gated per-category the way source-scoped
# mark_inactive needs: the portal stays supports_complete_walk=false (registry
# row, migration 117), so the runner never flips its listings inactive from index
# absence (architectural rule #3) — delistings still surface via a gone detail
# fetch (immediate per-listing flip) + the "active = seen within 7 days" rule.
# Coordinates come straight from the estate JSON, so no MAPY_CZ_API_KEY is needed.
#
# WHY combined (not cadence-split like sreality/idnes/ceskereality): mmreality is
# a modest catalogue (~6-12k listings) with no deep-pagination/page cap, so a full
# mixed-index walk is ~8 min — the index+detail run fits one job. It is the
# size-appropriate posture (remax/bezrealitky/maxima). The scheduled run walks the
# FULL index (no --max-pages) then drains under a --max-seconds budget that
# finalizes cleanly inside the timeout; the queue persists across runs, so the
# initial backfill drains over a few ticks (or a wider ad-hoc dispatch). Writes
# 'index' + 'detail' scrape_runs rows under source='mmreality' (its own Health
# lane; does not touch sreality liveness / reconciliation).

on:
  # Offset from ceskereality's index walk (25 */6) so the two CF-blocked portals
  # don't hammer the shared residential proxy at the same minute.
  schedule:
    - cron: "50 */6 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: cap index pages walked (ad-hoc partial). Blank = full walk.
        required: false
        default: ""
        type: string
      max_detail:
        description: cap detail-drain claims this run (raise for a one-time backfill)
        required: false
        default: "4000"
        type: string
      rate:
        description: detail-fetch requests/second ceiling
        required: false
        default: "2.0"
        type: string
      workers:
        description: detail-fetch workers (concurrency; raise for a one-time backfill)
        required: false
        default: "4"
        type: string
      max_seconds:
        description: detail-drain wall-clock budget; it finalizes cleanly before this. Blank = 2400 (40 min).
        required: false
        default: ""
        type: string

concurrency:
  group: mmreality-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Full index (~8 min) + a --max-seconds-bounded drain (default 40 min) finalize
    # well inside this generous backstop; the clean-stop budget governs, not the
    # timeout — don't re-tune the timeout to the catalogue size.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run mmreality scrape
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SCRAPER_PROXY_URL: ${{ secrets.SCRAPER_PROXY_URL }}
          MAPY_CZ_API_KEY: ${{ secrets.MAPY_CZ_API_KEY }}
          MAPY2_CZ_API_KEY: ${{ secrets.MAPY2_CZ_API_KEY }}
          MAX_PAGES: ${{ inputs.max_pages }}
          MAX_DETAIL: ${{ inputs.max_detail || '4000' }}
          RATE: ${{ inputs.rate || '2.0' }}
          WORKERS: ${{ inputs.workers || '4' }}
          MAX_SECONDS: ${{ inputs.max_seconds || '2400' }}
        run: |
          ARGS="--max-detail $MAX_DETAIL --rate $RATE --workers $WORKERS --max-seconds $MAX_SECONDS"
          if [ -n "$MAX_PAGES" ]; then ARGS="$ARGS --max-pages $MAX_PAGES"; fi
          echo "python -m scraper.mmreality_main $ARGS"
          eval "python -m scraper.mmreality_main $ARGS"
