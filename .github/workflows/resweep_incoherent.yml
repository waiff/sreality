name: Re-sweep incoherent byt properties (one-shot corrective)

# One-shot corrective for pre-PR-#598 apartment groupings the post-#598 engine would
# now reject. The old engine merged byt listings up to a 20% area gap, and pHash on
# shared development RENDER photos chained adjacent area-bands into one property via
# transitivity ("Rezidence Na Bradle" 73/87/99 m²; "Budovatelů" 59/62/74 m²). PR #598
# unified the area-gap reject to 10% + added the floor-plan / distinctive gates, so the
# engine would never form these now. This re-singletonizes every active byt property
# whose active members' max/min area ratio exceeds min_ratio: the representative child
# stays, every other detaches onto its own fresh singleton. Operator-merged properties
# are excluded. Nothing is deleted (rule #3); the dedup engine re-merges legit same-unit
# pairs on its next daily run.
#
# Dispatch-only. Defaults to a DRY RUN. min_ratio 1.25 (~>20% gap) is the safe tier;
# 1.111 (~>10%) reaches the gray zone (genuine same-flat area noise). Required GitHub
# secret: SUPABASE_DB_URL.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Actually re-singletonize (false = dry-run report only)
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      min_ratio:
        description: max/min area ratio threshold (1.25 ~ >20% safe; 1.111 ~ >10% gray zone)
        required: false
        default: "1.25"
        type: string
      limit:
        description: Cap properties processed, worst-first (0 = no cap)
        required: false
        default: "0"
        type: string

concurrency:
  group: sreality-property-maintenance
  cancel-in-progress: false

jobs:
  resweep:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[api]"

      - name: Re-sweep incoherent byt properties
        run: |
          ARGS="--min-ratio ${{ inputs.min_ratio || '1.25' }} --limit ${{ inputs.limit || '0' }}"
          if [ "${{ inputs.apply }}" = "true" ]; then ARGS="$ARGS --apply"; fi
          echo "python -m scripts.resweep_incoherent_byt_properties $ARGS"
          python -m scripts.resweep_incoherent_byt_properties $ARGS
