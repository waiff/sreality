name: "Scraping: iDNES Reality detail drain"

# portal: idnes
# The slow half of the iDNES cadence split (architectural rule #19, like sreality).
# Claims a bounded slice of listing_detail_queue (source='idnes', enqueued by
# idnes_index_walk.yml), fetches each listing page on a rate-limited worker pool,
# parses it to a ScrapedListing, and ingests via db.ingest_scraped_listing (Tier-0
# idempotency + Tier-1 property matching). The per-listing category is derived from
# its detail URL. Records run_type='detail' (index_pages=0). The drain records
# image-URL rows; the shared images.yml job downloads the bytes to R2.
#
# Bounded by a wall-clock budget (--max-seconds, default 2400 = 40 min, safely
# under the 50-min job timeout) so the run always FINALIZES cleanly — it stops
# claiming and records ended_at rather than being SIGKILLed mid-flight (which would
# leave a "stuck" scrape_run on the Health dashboard). The queue persists across
# runs, so the first ~days drain the initial ~60k backlog, then it idles when the
# queue is empty. A gone detail (404 / redirect off /detail/) flips that listing
# inactive + dequeues it.
#
# Hourly cron (the budget caps each run at ~40 min, so the next tick has a ~20-min
# gap — no overlap). Doubles backfill throughput vs the prior every-2h cadence; the
# concurrency group still serialises runs if GitHub slips a tick.
#
# Required secret: SUPABASE_DB_URL (single-row ingest uses the transaction pooler).

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:
    inputs:
      max_seconds:
        description: wall-clock drain budget, finalizes cleanly before timeout (blank = 2400 = 40 min)
        required: false
        default: ""
        type: string
      max_detail:
        description: hard cap on listings claimed this run (blank = none; the time budget governs)
        required: false
        default: ""
        type: string
      workers:
        description: concurrent detail-fetch workers (blank = 8)
        required: false
        default: ""
        type: string
      rate:
        description: global detail-fetch rate cap, req/s (blank = 4.0)
        required: false
        default: ""
        type: string

concurrency:
  group: idnes-detail-drain
  cancel-in-progress: false

jobs:
  detail-drain:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run idnes detail drain
        id: drain
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MAPY_CZ_API_KEY: ${{ secrets.MAPY_CZ_API_KEY }}
          MAX_SECONDS: ${{ inputs.max_seconds || '2400' }}
          MAX_DETAIL: ${{ inputs.max_detail }}
          WORKERS: ${{ inputs.workers || '8' }}
          RATE: ${{ inputs.rate || '4.0' }}
        run: |
          ARGS="--drain-only --max-seconds $MAX_SECONDS --workers $WORKERS --rate $RATE"
          if [ -n "$MAX_DETAIL" ]; then ARGS="$ARGS --max-detail $MAX_DETAIL"; fi
          echo "python -m scraper.idnes_main $ARGS"
          # Capture python's own exit code through the tee pipe, record how many
          # listings this run claimed (drives the chain decision), then exit with
          # python's code so a failure doesn't chain.
          set +e
          eval "python -m scraper.idnes_main $ARGS" 2>&1 | tee /tmp/idnes_drain.log
          RC=${PIPESTATUS[0]}
          set -e
          CLAIMED=$(grep -oE 'RUN done .*claimed=[0-9]+' /tmp/idnes_drain.log | grep -oE 'claimed=[0-9]+' | tail -1 | cut -d= -f2 || true)
          echo "claimed=${CLAIMED:-0}" >> "$GITHUB_OUTPUT"
          exit $RC

      # Re-dispatch for back-to-back cadence only when there was work to do, so a
      # large backlog drains continuously instead of ~40 min on / ~80 min idle
      # (GitHub throttles the hourly cron). Empty queue -> claimed=0 -> no chain;
      # the hourly cron restarts it when the next index walk enqueues work.
      - name: Chain next run (near-continuous)
        if: ${{ success() && steps.drain.outputs.claimed != '0' && steps.drain.outputs.claimed != '' }}
        env:
          CHAIN_TOKEN: ${{ secrets.SCRAPE_CHAIN_TOKEN }}
        run: |
          if [ -z "$CHAIN_TOKEN" ]; then
            echo "SCRAPE_CHAIN_TOKEN not set — idnes drain stays cron-driven (hourly)."
            exit 0
          fi
          echo "Re-dispatching idnes_detail_drain.yml (claimed=${{ steps.drain.outputs.claimed }} > 0)."
          curl -sS -X POST \
            -H "Authorization: Bearer $CHAIN_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/idnes_detail_drain.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"
