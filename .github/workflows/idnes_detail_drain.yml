name: "Scraping: iDNES Reality detail drain"

# The slow half of the iDNES cadence split (architectural rule #19, like sreality).
# Claims a bounded slice of listing_detail_queue (source='idnes', enqueued by
# idnes_index_walk.yml), fetches each listing page on a rate-limited worker pool,
# parses it to a ScrapedListing, and ingests via db.ingest_scraped_listing (Tier-0
# idempotency + Tier-1 property matching). The per-listing category is derived from
# its detail URL. Records run_type='detail' (index_pages=0). The drain records
# image-URL rows; the shared images.yml job downloads the bytes to R2.
#
# Bounded per run (--max-detail) so it always finalizes inside the timeout; the
# queue persists across runs (a SIGKILLed claim is reclaimed by the next run), so a
# bounded run never loses work and the first ~day drains the initial ~60k backlog,
# then it idles when the queue is empty. A gone detail (404 / redirect off /detail/)
# flips that listing inactive + dequeues it.
#
# Required secret: SUPABASE_DB_URL (single-row ingest uses the transaction pooler).

on:
  schedule:
    - cron: "30 */2 * * *"
  workflow_dispatch:
    inputs:
      max_detail:
        description: cap listings claimed + fetched this run (blank = 6000)
        required: false
        default: ""
        type: string
      workers:
        description: concurrent detail-fetch workers (blank = 8)
        required: false
        default: ""
        type: string
      rate:
        description: global detail-fetch rate cap, req/s (blank = 4.0)
        required: false
        default: ""
        type: string

concurrency:
  group: idnes-detail-drain
  cancel-in-progress: false

jobs:
  detail-drain:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run idnes detail drain
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MAX_DETAIL: ${{ inputs.max_detail || '6000' }}
          WORKERS: ${{ inputs.workers || '8' }}
          RATE: ${{ inputs.rate || '4.0' }}
        run: |
          ARGS="--drain-only --max-detail $MAX_DETAIL --workers $WORKERS --rate $RATE"
          echo "python -m scraper.idnes_main $ARGS"
          eval "python -m scraper.idnes_main $ARGS"
