name: "Data: seed broker settings (free-email + franchise domains)"

# One-shot workflow that populates the two app_settings rows created as `[]`
# placeholders by migration 186 — `broker_free_email_domains` and
# `broker_franchise_domains` — from the committed JSON files
# (data/broker_free_email_domains.json + data/broker_franchise_domains.json).
#
# The broker resolver (scripts.resolve_brokers) reads broker_free_email_domains to
# decide which email domains are NOT firms; an empty list would mis-create a "firm"
# per free provider (gmail.com, seznam.cz, ...). Trigger this once after applying
# migration 186, and again whenever the operator edits either committed file.
# Deliberately dispatch-ONLY (no cron) so it never clobbers later operator edits to
# the lists — same posture as seed_condition_settings.yml. Every prior value is
# preserved by the app_settings_history trigger (migration 020), so it is safe to
# re-run.
#
# Required GitHub secret: SUPABASE_DB_URL. No LLM cost — pure DB UPDATE.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Print domain counts and exit without UPDATEing
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run seed
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python -m scripts.seed_broker_settings $ARGS
