name: Apply R2 Phase D prep (NOT NULL relax, small PK swaps, listings indexes)

# Phase D of the listing-identity refactor
# (docs/design/listing-identity-r2-pk-swap-runbook.md § 5, steps 2-5). Drops NOT
# NULL on every R2_CARRIERS legacy column still enforcing it, swaps
# estimation_cohort_entries's PK onto (estimation_run_id, listing_id), and
# pre-builds the two indexes + id NOT NULL that Gate 1's PK swap on `listings`
# itself will need. All additive/reversible — no writer-deploy dependency (see
# scripts/apply_r2_phase_d_prep.py's docstring for why dirty_broker_listings is
# NOT included here).
#
# Dispatch-only, own concurrency group, idempotent: every step checks current
# state first, so a killed run resumes rather than redoing work.
#
# Required secrets: SUPABASE_DB_URL, SUPABASE_DB_SESSION_URL (session pooler — the
# two CONCURRENTLY index builds on `listings`, 562k+ rows, are illegal inside a
# transaction and too long for the transaction pooler's ~2 minute cap).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Report what each step still needs and exit
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: apply-r2-phase-d-prep
  cancel-in-progress: false

jobs:
  phase-d-prep:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_DB_SESSION_URL: ${{ secrets.SUPABASE_DB_SESSION_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Apply R2 Phase D prep
        run: |
          set -o pipefail
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python -m scripts.apply_r2_phase_d_prep $ARGS 2>&1
