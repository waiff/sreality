name: Apply R2 unique guards (indexes + NOT NULL checks)

# Phase B2 of the listing-identity refactor
# (docs/design/listing-identity-r2-pk-swap-runbook.md § 3, items 4-5). Builds new
# unique indexes on the surrogate listing_id column(s) alongside the still-live
# legacy sreality_id-keyed ones, then adds a validated CHECK (listing_id IS NOT
# NULL) wherever the legacy column is itself NOT NULL.
#
# Runs only AFTER Phase B (apply_r2_constraints.yml) has indexed + FK'd the
# surrogate columns. Additive only — nothing here touches a legacy constraint.
#
# Dispatch-only, own concurrency group, idempotent: every step checks for its own
# result first, so a killed run resumes rather than redoing work. A CONCURRENTLY
# build killed mid-flight leaves an INVALID index, which the script detects and
# rebuilds instead of trusting.
#
# Required secrets: SUPABASE_DB_URL, SUPABASE_DB_SESSION_URL (session pooler — the
# images-scale index build and its validation are far past the transaction
# pooler's ~2 minute cap).

on:
  workflow_dispatch:
    inputs:
      table:
        description: Single carrier table (blank = all)
        required: false
        default: ""
        type: string
      dry_run:
        description: Report what each guard still needs and exit
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: apply-r2-unique-guards
  cancel-in-progress: false

jobs:
  unique-guards:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_DB_SESSION_URL: ${{ secrets.SUPABASE_DB_SESSION_URL }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Apply R2 unique guards
        run: |
          set -o pipefail
          ARGS=""
          if [ -n "${{ inputs.table }}" ]; then ARGS="$ARGS --table ${{ inputs.table }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python -m scripts.apply_r2_unique_guards $ARGS 2>&1
