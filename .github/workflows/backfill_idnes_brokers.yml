name: "Data: backfill idnes broker blocks"

# One-shot backfill: reparse the staged idnes detail HTML (portal_raw_pages) into
# listings.raw_json.broker via scraper.broker_idnes.parse_idnes_broker. raw_json.broker
# is OUT of the content hash (_HASH_FIELDS is typed columns only), so this never churns
# snapshots. The broker resolver then attributes idnes brokers from raw_json.broker like
# sreality's raw_json.user. No re-fetch, no LLM, no new secrets.
#
# Dispatch-only + resumable (skips listings that already carry a broker block), so
# re-dispatch until it reports parsed≈0 / no progress. After it completes, run
# resolve_brokers_full to attribute the idnes brokers.

on:
  workflow_dispatch:
    inputs:
      max_seconds:
        description: Wall-clock budget; resume from the cursor next run
        required: false
        default: "3000"
        type: string
      dry_run:
        description: Parse + report counts without writing
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: idnes-broker-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e .
      - name: Backfill idnes brokers
        run: |
          ARGS="--max-seconds ${{ inputs.max_seconds || '3000' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "python -m scripts.backfill_idnes_brokers $ARGS"
          python -m scripts.backfill_idnes_brokers $ARGS
