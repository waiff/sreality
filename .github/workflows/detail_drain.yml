name: "Scraping: Sreality detail drain (Phase 2)"

# portal: sreality
# The slow half of the Phase-2 cadence split, now on the shared portal
# framework: `scraper.sreality_main --drain-only` drives SrealityPortal through
# the one generic portal_runner. Claims a bounded slice of listing_detail_queue
# (source='sreality', enqueued by index_walk.yml), fetches each listing's
# detail on a rate-limited worker pool (429/403 auto-penalize), and writes them
# in batches via the set-based write_detail_batch (one transaction per ~100
# listings) on the Session-mode pooler — the Phase-1 prepared-statement win.
# New listings land with property_id NULL; the Tier-1 matcher is deferred to
# the recompute_property_stats straggler-attach phase.
#
# workers / rate / max-detail default to the per-portal config
# (portals.operational_limits: 8 workers, 6.0 req/s, 12000 claims/run — the
# operator-tunable surface, no deploy); a dispatch input overrides. Bounded by
# a wall-clock budget too (--max-seconds, default 2400 = 40 min, safely under
# the 50-min job timeout) so the run always FINALIZES cleanly — it stops
# claiming and records ended_at rather than being SIGKILLed mid-flight. The
# queue persists across runs; failure-priority retries drain first. A gone
# detail fetch (404/410) flips that listing inactive immediately, clears its
# listing_fetch_failures row, and dequeues it; a transient error bumps the
# queue row's attempts (given up after 5) + the failure ledger. Records
# run_type='detail' with index_pages=0; counters are bumped per chunk
# (crash-survivable) and finalize never re-writes them.
#
# CADENCE: every 15 min. Concurrency group isolated from the index walk and the
# fallback scrape; cancel-in-progress=false so a drain is never killed mid-batch
# (a SIGKILLed claim is reclaimed by the next run's reclaim_stale_claims).
#
# Required GitHub secrets:
#   SUPABASE_DB_SESSION_URL — Session-mode pooler (port 5432) for the batched
#     prepared writes. Falls back to SUPABASE_DB_URL when unset.
#   SUPABASE_DB_URL — transaction pooler (used by run bookkeeping + dry-run).

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      max_seconds:
        description: "wall-clock drain budget, finalizes cleanly before timeout (blank = 2400 = 40 min)"
        required: false
        default: ""
        type: string
      max_detail:
        description: "cap listings claimed + fetched this run (blank = per-portal config, 12000)"
        required: false
        default: ""
        type: string
      workers:
        description: "concurrent detail-fetch workers (blank = per-portal config, 8)"
        required: false
        default: ""
        type: string
      rate:
        description: "global detail-fetch rate cap, req/s (blank = per-portal config, 6.0)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Report the claimable queue depth and exit without claiming"
        required: false
        type: boolean
        default: false

concurrency:
  group: sreality-detail-drain
  cancel-in-progress: false

jobs:
  detail-drain:
    runs-on: ubuntu-latest
    # The fetch rate (6 req/s) is the bottleneck, not the batched write. The
    # --max-seconds clean-stop (40 min) is the real bound; this timeout is the
    # outer backstop, kept under the API's sweep_stuck_scrape_runs cutoff
    # (90 min).
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run detail drain
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_DB_SESSION_URL: ${{ secrets.SUPABASE_DB_SESSION_URL }}
          MAX_SECONDS: ${{ inputs.max_seconds || '2400' }}
          MAX_DETAIL: ${{ inputs.max_detail }}
          WORKERS: ${{ inputs.workers }}
          RATE: ${{ inputs.rate }}
        run: |
          # workers / rate / max-detail default to the per-portal config
          # (portals.operational_limits); a dispatch input overrides. Hardcoding
          # them here would pin the values the operator tunes in the registry.
          ARGS="--drain-only --max-seconds $MAX_SECONDS"
          if [ -n "$MAX_DETAIL" ]; then ARGS="$ARGS --max-detail $MAX_DETAIL"; fi
          if [ -n "$WORKERS" ]; then ARGS="$ARGS --workers $WORKERS"; fi
          if [ -n "$RATE" ]; then ARGS="$ARGS --rate $RATE"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          echo "python -m scraper.sreality_main $ARGS"
          eval "python -m scraper.sreality_main $ARGS"
