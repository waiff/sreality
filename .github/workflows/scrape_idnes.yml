name: "Scraping: iDNES Reality scraper (pilot)"

# Scheduled (every 6h) + manual scraper for reality.idnes.cz on the shared portal
# framework. One job runs both phases: an index walk pages the HTML search
# results and enqueues new/price-changed ids into listing_detail_queue, then a
# detail drain fetches each listing page, parses to a ScrapedListing, and ingests
# through db.ingest_scraped_listing (Tier-0 idempotency + Tier-1 property matching).
#
# Categories live in the `portals` registry row (migrations 110/111), not here, so
# coverage is tuned with a SQL update, no workflow edit. A scheduled run takes no
# inputs and does a FULL per-category walk (no --max-pages), which is provable-
# complete (search pages carry a result total + no deep-pagination cap), so the
# runner marks delisted listings inactive under the completeness guard —
# source-scoped to idnes rows only (architectural rules #3/#15).
#
# Writes 'index' + 'detail' scrape_runs rows under source='idnes' (its own
# Health-page lane; does not touch sreality liveness / reconciliation). Images:
# the drain records image-URL rows; the shared images.yml job downloads the bytes
# to R2 (source-agnostic). Coordinates come from the page's embedded map config,
# so no MAPY_CZ_API_KEY is needed.
#
# Required secret: SUPABASE_DB_URL.
#
# Cadence: every 6h, offset off the other scrapers. iDNES is large (tens of
# thousands of listings/category), so the index walk takes ~10-15 min and the
# detail drain is bounded per run (--max-detail); the queue persists across runs,
# so the first ~1-2 days drain the initial backlog, then it is steady-state.

on:
  schedule:
    - cron: "15 */6 * * *"
  workflow_dispatch:
    inputs:
      max_pages:
        description: cap index pages per category (ad-hoc partial; suppresses mark_inactive). Blank = full walk.
        required: false
        default: ""
        type: string
      max_detail:
        description: cap detail-drain claims this run
        required: false
        default: "6000"
        type: string
      rate:
        description: detail-fetch requests/second ceiling
        required: false
        default: "3.0"
        type: string

concurrency:
  group: idnes-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run idnes scrape
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MAX_PAGES: ${{ inputs.max_pages }}
          MAX_DETAIL: ${{ inputs.max_detail || '6000' }}
          RATE: ${{ inputs.rate || '3.0' }}
        run: |
          ARGS="--max-detail $MAX_DETAIL --rate $RATE"
          if [ -n "$MAX_PAGES" ]; then ARGS="$ARGS --max-pages $MAX_PAGES"; fi
          echo "python -m scraper.idnes_main $ARGS"
          eval "python -m scraper.idnes_main $ARGS"
