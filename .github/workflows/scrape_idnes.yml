name: "Scraping: iDNES Reality combined walk (fallback)"

# DISPATCH-ONLY combined index+detail fallback for reality.idnes.cz, mirroring
# sreality's scrape.yml. The scheduled pipeline is the cadence SPLIT — the fast
# idnes_index_walk.yml (full walk + mark_inactive + enqueue) feeds the bounded
# idnes_detail_drain.yml — because iDNES is large (~2400 index pages, ~60k
# listings) and a single combined run can't do both inside one job (the full
# index eats the window, starving the drain).
#
# This combined entry point stays for ad-hoc full runs and small validation
# passes (e.g. -f max_pages=2, which suppresses mark_inactive). One job runs the
# index walk then a bounded detail drain via idnes_main. No schedule — re-add a
# `schedule:` cron here to revert to a combined cadence if ever needed.
#
# Writes 'index' + 'detail' scrape_runs rows under source='idnes'. Coordinates
# come from the page when present; the drain falls back to geocoding the
# locality via Mapy.cz when the page omits the map config (optional —
# MAPY_CZ_API_KEY; without it the fallback is a no-op). Required secret:
# SUPABASE_DB_URL.

on:
  workflow_dispatch:
    inputs:
      max_pages:
        description: cap index pages per category (ad-hoc partial; suppresses mark_inactive). Blank = full walk.
        required: false
        default: ""
        type: string
      max_detail:
        description: cap detail-drain claims this run
        required: false
        default: "6000"
        type: string
      rate:
        description: detail-fetch requests/second ceiling
        required: false
        default: "3.0"
        type: string

concurrency:
  group: idnes-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run idnes scrape
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MAPY_CZ_API_KEY: ${{ secrets.MAPY_CZ_API_KEY }}
          MAX_PAGES: ${{ inputs.max_pages }}
          MAX_DETAIL: ${{ inputs.max_detail || '6000' }}
          RATE: ${{ inputs.rate || '3.0' }}
        run: |
          ARGS="--max-detail $MAX_DETAIL --rate $RATE"
          if [ -n "$MAX_PAGES" ]; then ARGS="$ARGS --max-pages $MAX_PAGES"; fi
          echo "python -m scraper.idnes_main $ARGS"
          eval "python -m scraper.idnes_main $ARGS"
