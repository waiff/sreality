name: "Scraping: iDNES Reality crawler (pilot)"

# Scheduled (every 6h) + manual crawler for reality.idnes.cz, on the shared
# portal framework (Phase 4). One process runs both phases: an index-walk that
# stages raw pages and enqueues listings into the shared listing_detail_queue
# (source='idnes'), then a detail-drain that fetches + parses + ingests through
# db.ingest_scraped_listing (Tier-0 idempotency + Tier-1 property matching).
#
# Records its own scrape_runs rows tagged source='idnes' (an 'index' + a
# 'detail' row) so the Health dashboard shows iDNES activity per-source. A
# one-category crawl is a partial walk, so the runner never runs mark_inactive
# (architectural rule #3) — it only upserts.
#
# Required secrets: SUPABASE_DB_URL. Optional: MAPY_CZ_API_KEY — idnes embeds
# precise per-listing coordinates in the page, so the geocoder is only a fallback
# for the rare coordless listing; the crawl runs fine without it.
#
# Cadence: every 6h, offset off bazos's :30 and the hourly recompute's :00 so a
# crawl's Tier-1 attaches are picked up by the next recompute within the hour. A
# scheduled run has no inputs, so the run falls back to prodej/byty (the pilot
# scope) bounded by --max-pages 2 — small enough to stay inside the 20-min
# timeout. Widen / shard once the pilot proves the full-category run time;
# workflow_dispatch stays the manual escape hatch with its own inputs.

on:
  schedule:
    - cron: "45 */6 * * *"
  workflow_dispatch:
    inputs:
      sale_type:
        description: prodej (sale) or pronajem (rent)
        type: choice
        default: prodej
        options: [prodej, pronajem]
      category:
        description: idnes category segment
        type: choice
        default: byty
        options: [byty, domy, pozemky, komercni, ostatni]
      locality:
        description: idnes region path segment (e.g. praha); blank = nationwide
        required: false
        default: ""
        type: string
      max_pages:
        description: cap index pages walked (pilot safety)
        required: false
        default: "2"
        type: string

concurrency:
  group: idnes-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run idnes crawl
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MAPY_CZ_API_KEY: ${{ secrets.MAPY_CZ_API_KEY }}
          # inputs.* are empty on a scheduled run, so fall back to the pilot scope.
          SALE_TYPE: ${{ inputs.sale_type || 'prodej' }}
          CATEGORY: ${{ inputs.category || 'byty' }}
          LOCALITY: ${{ inputs.locality }}
          MAX_PAGES: ${{ inputs.max_pages || '2' }}
        run: |
          ARGS="--sale-type $SALE_TYPE --category $CATEGORY"
          if [ -n "$LOCALITY" ]; then ARGS="$ARGS --locality '$LOCALITY'"; fi
          if [ -n "$MAX_PAGES" ]; then ARGS="$ARGS --max-pages $MAX_PAGES"; fi
          echo "python -m scraper.idnes_main $ARGS"
          eval "python -m scraper.idnes_main $ARGS"
