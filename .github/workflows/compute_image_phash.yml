name: Compute image pHash (multi-portal dedup)

# Backfills images.phash (a 64-bit perceptual dHash per stored image) for the
# Tier-2 dedup sweep's cheap image corroborator. Downloads stored bytes from R2,
# hashes them, writes images.phash. Idempotent + resumable; a no-op if R2 env
# vars are missing.
#
# Cadence: every 6 hours, offset off the image-download workflow so freshly
# stored images get hashed shortly after they land. Portal-agnostic — hashes any
# stored image regardless of source.
#
# Required GitHub secrets: SUPABASE_DB_URL + the R2_* set (same as images.yml).

on:
  schedule:
    - cron: "20 */6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: Max images hashed per run
        required: false
        default: "5000"
        type: string
      dry_run:
        description: Report the pending count and exit without writing
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: compute-image-phash
  cancel-in-progress: false

jobs:
  phash:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Compute pHashes
        run: |
          ARGS="--limit ${{ inputs.limit || '5000' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python -m scripts.compute_image_phash $ARGS
