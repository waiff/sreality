name: "Scraping: RealityMix detail drain"

# portal: realitymix
# The slow half of the realitymix cadence split (architectural rule #19, like
# sreality/idnes/ceskereality). Claims a bounded slice of listing_detail_queue
# (source='realitymix', enqueued by realitymix_index_walk.yml), fetches each listing
# page on a rate-limited worker pool, parses it to a ScrapedListing, and ingests via
# db.ingest_scraped_listing (Tier-0 idempotency + property singleton). The per-listing
# category is read from the page's BreadcrumbList JSON-LD. Records run_type='detail'
# (index_pages=0). The drain records image-URL rows; the shared images.yml job
# downloads the bytes to R2.
#
# Bounded by a wall-clock budget (--max-seconds, default 2400 = 40 min, safely under
# the 50-min job timeout) so the run always FINALIZES cleanly — it stops claiming and
# records ended_at rather than being SIGKILLed mid-flight. The queue persists across
# runs, so the first ~1-2 days drain the initial ~48k backlog at the polite rate, then
# it idles when empty. A gone detail (404 / redirect off the /detail/ path) flips that
# listing inactive + dequeues it. Coordinates come from the page for ~72% of listings;
# the ~28% with no #print-map are geocoded from their locality via Mapy.cz (idnes
# pattern: skip-if-geom + carry stored coords forward, so a listing is geocoded at most
# once — never the every-refetch runaway that exhausted the Mapy key on idnes).
# Required secret: SUPABASE_DB_URL. Optional: MAPY_CZ_API_KEY (+ MAPY2 backup) — unset
# just leaves the map-less rows without coords (graceful no-op, never breaks the drain).
# Optional: SCRAPE_CHAIN_TOKEN — when set, a run that claimed work re-dispatches itself
# (self-chaining, the idnes pattern) so the standing backlog drains near-continuously
# instead of ~40 min on / ~80 min idle; unset leaves it cron-driven (hourly).
#
# LIVE: the index-walk validation (PR #639) was green and a drain dispatch wrote 80
# listings + 1165 image URLs with 0 errors, so the hourly cron is enabled. Self-chaining
# was added once the 6-hourly index walk's ~10k-per-walk enqueue outpaced the hourly
# drain (a standing ~10k detail-queue backlog); it idles the moment the queue empties.

on:
  schedule:
    - cron: "40 * * * *"
  workflow_dispatch:
    inputs:
      max_seconds:
        description: wall-clock drain budget, finalizes cleanly before timeout (blank = 2400 = 40 min)
        required: false
        default: ""
        type: string
      max_detail:
        description: hard cap on listings claimed this run (blank = none; the time budget governs)
        required: false
        default: ""
        type: string
      workers:
        description: concurrent detail-fetch workers (blank = 4)
        required: false
        default: ""
        type: string
      rate:
        description: global detail-fetch rate cap, req/s (blank = 1.5)
        required: false
        default: ""
        type: string

concurrency:
  group: realitymix-detail-drain
  cancel-in-progress: false

jobs:
  detail-drain:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run realitymix detail drain
        id: drain
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MAPY_CZ_API_KEY: ${{ secrets.MAPY_CZ_API_KEY }}
          MAPY2_CZ_API_KEY: ${{ secrets.MAPY2_CZ_API_KEY }}
          MAX_SECONDS: ${{ inputs.max_seconds || '2400' }}
          MAX_DETAIL: ${{ inputs.max_detail }}
          WORKERS: ${{ inputs.workers || '4' }}
          RATE: ${{ inputs.rate || '1.5' }}
        run: |
          ARGS="--drain-only --max-seconds $MAX_SECONDS --workers $WORKERS --rate $RATE"
          if [ -n "$MAX_DETAIL" ]; then ARGS="$ARGS --max-detail $MAX_DETAIL"; fi
          echo "python -m scraper.realitymix_main $ARGS"
          # Capture python's own exit code through the tee pipe, record how many
          # listings this run claimed (drives the chain decision), then exit with
          # python's code so a failure doesn't chain.
          set +e
          eval "python -m scraper.realitymix_main $ARGS" 2>&1 | tee /tmp/realitymix_drain.log
          RC=${PIPESTATUS[0]}
          set -e
          CLAIMED=$(grep -oE 'RUN done .*claimed=[0-9]+' /tmp/realitymix_drain.log | grep -oE 'claimed=[0-9]+' | tail -1 | cut -d= -f2 || true)
          echo "claimed=${CLAIMED:-0}" >> "$GITHUB_OUTPUT"
          exit $RC

      # Re-dispatch for back-to-back cadence only when there was work to do, so the
      # standing detail backlog (the 6-hourly index walk enqueues ~10k at a time)
      # drains continuously instead of ~40 min on / ~80 min idle (GitHub throttles
      # the hourly cron). Empty queue -> claimed=0 -> no chain; the hourly cron
      # restarts it when the next index walk enqueues work. Mirrors idnes exactly.
      - name: Chain next run (near-continuous)
        if: ${{ success() && steps.drain.outputs.claimed != '0' && steps.drain.outputs.claimed != '' }}
        env:
          CHAIN_TOKEN: ${{ secrets.SCRAPE_CHAIN_TOKEN }}
        run: |
          if [ -z "$CHAIN_TOKEN" ]; then
            echo "SCRAPE_CHAIN_TOKEN not set — realitymix drain stays cron-driven (hourly)."
            exit 0
          fi
          echo "Re-dispatching realitymix_detail_drain.yml (claimed=${{ steps.drain.outputs.claimed }} > 0)."
          curl -sS -X POST \
            -H "Authorization: Bearer $CHAIN_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/realitymix_detail_drain.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"
