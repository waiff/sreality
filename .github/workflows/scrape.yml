name: Daily Sreality scrape

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Cap number of index entries (blank = all)"
        required: false
        type: string
      dry_run:
        description: "Don't write to the database"
        required: false
        type: boolean
        default: false
      detail_only:
        description: "Refetch a single listing by id (skips index)"
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ inputs.limit }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.detail_only }}" ]; then
            ARGS="$ARGS --detail-only ${{ inputs.detail_only }}"
          fi
          echo "Running with: $ARGS"
          python -m scraper.main $ARGS
