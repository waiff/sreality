name: Daily Sreality scrape

# Deep nightly run. Walks all six category pairs sequentially:
#   byt + dum + komercni  ×  pronajem + prodej
#
# Since scrape_delta.yml now does a COMPLETE index walk every 15 minutes
# (carrying mark_inactive + gone detection + new-listing pickup + inline
# image downloads), this nightly is no longer the sole freshness driver.
# Its distinct value is the expensive backlog work the 15-min ticks skip:
# the condition-scoring phase (LLM cost), a deep image-backlog drain, and
# a high-cap detail-refetch catch-up for anything the per-tick caps
# deferred. It records as run_type='full'.
#
# Always aggressive (the conservative profile was retired when scope
# expanded from one category to six):
#   timeout 350 min (~5.8 h, just under the 6h GitHub job cap)
#   up to 10 000 detail refetches global cap, 2 000 per category
#       (= 250 min at 1.5s/detail; per-category cap stops one
#       high-volume category like byt/prodej from starving the rest
#       of the categories of the shared global budget — listings the
#       cap defers drain on subsequent runs)
#   up to 50 000 image downloads  (= ~80 min at 16 workers, leaves
#       ~20 min headroom under the 350-min job cap; paired with the
#       separate images.yml workflow that drains the backlog three
#       extra times per day)
#
# Cron triggers cannot pass inputs - they always fall back to the
# defaults below. workflow_dispatch lets the operator override any
# cap or skip the image phase for ad-hoc runs.

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Cap number of listings scraped (blank = all). Applies across the whole run, not per category. Tick 'Skip image download phase' for isolated tests."
        required: false
        type: string
      dry_run:
        description: "Don't write to the database"
        required: false
        type: boolean
        default: false
      detail_only:
        description: "Refetch a single listing by id (skips index)"
        required: false
        type: string
      no_image_downloads:
        description: "Skip image download phase"
        required: false
        type: boolean
        default: false
      max_detail_refetches:
        description: "Override global detail-refetches-per-run cap (blank = 10000)"
        required: false
        type: string
      max_detail_refetches_per_category:
        description: "Override per-category detail-refetches cap (blank = 2000)"
        required: false
        type: string
      max_image_downloads:
        description: "Override images-per-run cap (blank = 50000)"
        required: false
        type: string
      image_workers:
        description: "Override concurrent workers (blank = 16)"
        required: false
        type: string
      no_condition_scoring:
        description: "Skip the condition-scoring phase"
        required: false
        type: boolean
        default: false
      max_condition_scores:
        description: "Override condition-scores-per-run cap (blank = 200; ~$3 at cached rate)"
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          # Optional. Condition-scoring phase no-ops when this is unset
          # (mirrors the image-download phase's R2 env gate).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ inputs.limit }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.detail_only }}" ]; then
            ARGS="$ARGS --detail-only ${{ inputs.detail_only }}"
          fi
          if [ "${{ inputs.no_image_downloads }}" = "true" ]; then
            ARGS="$ARGS --no-image-downloads"
          fi

          MAX_REFETCH="${{ inputs.max_detail_refetches }}"
          if [ -z "$MAX_REFETCH" ]; then
            MAX_REFETCH="10000"
          fi
          MAX_REFETCH_PER_CAT="${{ inputs.max_detail_refetches_per_category }}"
          if [ -z "$MAX_REFETCH_PER_CAT" ]; then
            MAX_REFETCH_PER_CAT="2000"
          fi
          MAX_IMG="${{ inputs.max_image_downloads }}"
          if [ -z "$MAX_IMG" ]; then
            MAX_IMG="50000"
          fi
          WORKERS="${{ inputs.image_workers }}"
          if [ -z "$WORKERS" ]; then
            WORKERS="16"
          fi
          ARGS="$ARGS --max-detail-refetches $MAX_REFETCH"
          ARGS="$ARGS --max-detail-refetches-per-category $MAX_REFETCH_PER_CAT"
          ARGS="$ARGS --max-image-downloads $MAX_IMG"
          ARGS="$ARGS --image-workers $WORKERS"

          if [ "${{ inputs.no_condition_scoring }}" = "true" ]; then
            ARGS="$ARGS --no-condition-scoring"
          fi
          MAX_SCORES="${{ inputs.max_condition_scores }}"
          if [ -z "$MAX_SCORES" ]; then
            MAX_SCORES="200"
          fi
          ARGS="$ARGS --max-condition-scores $MAX_SCORES"

          echo "Running with: $ARGS"
          python -m scraper.main $ARGS
