name: "Scraping: Sreality hourly run"

# The single scrape pipeline. Each run walks the COMPLETE index of all six
# category pairs (byt + dum + komercni × pronajem + prodej), so:
#   - newly-listed properties surface, and
#   - delisted properties flip to is_active=false — a complete walk is what
#     makes that inference valid (architectural rule #3).
#
# This replaces the former two-tier split (scrape_delta.yml hourly +
# scrape.yml nightly). Both tiers already did a complete walk; the only real
# differences were caps, concurrency, and the condition-scoring phase. Caps
# and concurrency are folded in here; condition scoring moved to its own
# decoupled hourly workflow (condition_scores.yml) so the LLM phase can never
# slow the scrape.
#
# Because the walk is complete (no --limit), mark_inactive runs every tick.
# scraper/main.py guards each per-category flip on walk completeness
# (collected vs the API's result_size), so a silently truncated index page
# never mass-flips live listings. A gone detail fetch (404/410 or sreality's
# "page does not exist" body) flips that single listing immediately instead
# of accumulating fetch failures.
#
# Detail refetches are capped per run (generous caps comfortably above hourly
# churn, so details don't perpetually lag, while still bounding worst-case
# run time). The image phase drains ACTIVE listings newest-first to empty
# (--images-active-only, no cap) — the user-visible coverage gap. The deep
# image-backlog drain (including inactive listings) stays in images.yml.
#
# CADENCE: hourly (0 * * * *). Each run is a complete walk; hourly keeps a
# steady, polite request volume against sreality. GitHub throttles scheduled
# workflows (worse overnight), so effective cadence may be slightly slower;
# the Health liveness check is tuned to this (warn >90 min, fail >180 min).
# For tighter cadence configure the optional SCRAPE_CHAIN_TOKEN PAT (see the
# "Chain next run" step). Recorded as run_type='full' (auto, since no --limit).
#
# Concurrency: cancel-in-progress=false so a long tick is never killed
# mid-walk; the next cron tick queues behind it instead of overlapping.
#
# Cron triggers cannot pass inputs — they always fall back to the defaults
# below. workflow_dispatch lets the operator override any cap, bump
# concurrency, or skip the image phase for ad-hoc runs.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Cap number of listings scraped (blank = all). Applies across the whole run, not per category. A capped run records run_type='delta' and skips mark_inactive."
        required: false
        type: string
      dry_run:
        description: "Don't write to the database"
        required: false
        type: boolean
        default: false
      detail_only:
        description: "Refetch a single listing by id (skips index)"
        required: false
        type: string
      no_image_downloads:
        description: "Skip image download phase"
        required: false
        type: boolean
        default: false
      max_detail_refetches:
        description: "Override global detail-refetches-per-run cap (blank = 4000)"
        required: false
        type: string
      max_detail_refetches_per_category:
        description: "Override per-category detail-refetches cap (blank = 1200)"
        required: false
        type: string
      max_image_downloads:
        description: "Override images-per-run cap (blank = 0 = drain active to empty / suspicious-stop)"
        required: false
        type: string
      image_workers:
        description: "Override concurrent image workers (blank = 16)"
        required: false
        type: string
      detail_workers:
        description: "Override concurrent detail-fetch workers (blank = 8)"
        required: false
        type: string
      detail_rate:
        description: "Override global detail-fetch rate cap, req/s (blank = 6.0)"
        required: false
        type: string

concurrency:
  group: sreality-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # A complete walk + capped detail refetch + active-image drain at the
    # bumped concurrency runs ~15-25 min. 50 gives headroom under the hourly
    # cadence; the self-chain re-dispatch keeps cadence steady if configured.
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ inputs.limit }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.detail_only }}" ]; then
            ARGS="$ARGS --detail-only ${{ inputs.detail_only }}"
          fi
          if [ "${{ inputs.no_image_downloads }}" = "true" ]; then
            ARGS="$ARGS --no-image-downloads"
          fi

          MAX_REFETCH="${{ inputs.max_detail_refetches }}"
          if [ -z "$MAX_REFETCH" ]; then
            MAX_REFETCH="4000"
          fi
          MAX_REFETCH_PER_CAT="${{ inputs.max_detail_refetches_per_category }}"
          if [ -z "$MAX_REFETCH_PER_CAT" ]; then
            MAX_REFETCH_PER_CAT="1200"
          fi
          MAX_IMG="${{ inputs.max_image_downloads }}"
          if [ -z "$MAX_IMG" ]; then
            MAX_IMG="0"
          fi
          WORKERS="${{ inputs.image_workers }}"
          if [ -z "$WORKERS" ]; then
            WORKERS="16"
          fi
          DETAIL_WORKERS="${{ inputs.detail_workers }}"
          if [ -z "$DETAIL_WORKERS" ]; then
            DETAIL_WORKERS="8"
          fi
          DETAIL_RATE="${{ inputs.detail_rate }}"
          if [ -z "$DETAIL_RATE" ]; then
            DETAIL_RATE="6.0"
          fi
          ARGS="$ARGS --max-detail-refetches $MAX_REFETCH"
          ARGS="$ARGS --max-detail-refetches-per-category $MAX_REFETCH_PER_CAT"
          ARGS="$ARGS --detail-workers $DETAIL_WORKERS"
          ARGS="$ARGS --detail-rate $DETAIL_RATE"
          ARGS="$ARGS --max-image-downloads $MAX_IMG"
          ARGS="$ARGS --image-workers $WORKERS"

          # Condition scoring is a separate decoupled workflow now
          # (condition_scores.yml); never run it inline with the scrape.
          ARGS="$ARGS --no-condition-scoring"
          # Drain active-listing images newest-first; images.yml handles the
          # deep inactive/historical backlog. Skip when isolating a test run.
          if [ "${{ inputs.no_image_downloads }}" != "true" ]; then
            ARGS="$ARGS --images-active-only"
          fi

          echo "Running with: $ARGS"
          python -m scraper.main $ARGS

      # The cron is hourly. OPTIONAL tighter cadence: if a chain PAT is
      # configured, re-dispatch this workflow on success for back-to-back
      # runs. The hourly cron stays the safety net that restarts the chain if
      # a run fails or the PAT is absent. GITHUB_TOKEN cannot re-trigger a
      # workflow (GitHub blocks recursion), so this needs a separate PAT
      # secret SCRAPE_CHAIN_TOKEN (fine-grained: this repo, Actions:
      # read+write). No-op without it.
      # Chain on schedule and on full manual/chained dispatches; skip for
      # one-off test runs (--limit / --detail-only / dry-run / no-images) so a
      # test doesn't kick off an endless full-run chain. For schedule events
      # the inputs.* are null, which == '' and is falsy, so the chain fires.
      - name: Chain next run (optional, tighter cadence)
        if: ${{ success() && inputs.limit == '' && inputs.detail_only == '' && !inputs.dry_run && !inputs.no_image_downloads }}
        env:
          CHAIN_TOKEN: ${{ secrets.SCRAPE_CHAIN_TOKEN }}
        run: |
          if [ -z "$CHAIN_TOKEN" ]; then
            echo "SCRAPE_CHAIN_TOKEN not set — cadence stays cron-driven (~hourly)."
            exit 0
          fi
          echo "Re-dispatching scrape.yml for tighter cadence."
          curl -sS -X POST \
            -H "Authorization: Bearer $CHAIN_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/scrape.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"
