name: Daily Sreality scrape

# Two run modes (apply to BOTH the listings phase and the image phase):
#   Conservative (default, always used for cron):
#     timeout 60 min
#     up to 2 000 detail refetches  (= 50 min at 1.5s/detail)
#     up to 1 000 image downloads   (= ~2 min at 8 workers)
#     Stays well under the 2 000 min/month free tier.
#   Aggressive (opt-in via the workflow_dispatch checkbox):
#     timeout 350 min (~5.8 h, just under the 6h GitHub job cap)
#     up to 10 000 detail refetches (= 250 min at 1.5s/detail)
#     up to 10 000 image downloads  (= ~10 min at 16 workers)
#     For manual bootstrap runs.
#
# Cron triggers cannot pass inputs - they always fall back to
# conservative defaults, by design. Listings the cap defers in
# one run get picked up next run via the same INDEX -> PLAN flow.

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      aggressive:
        description: "Aggressive mode: longer timeout, larger image cap, more workers"
        required: false
        type: boolean
        default: false
      limit:
        description: "Cap number of index entries (blank = all)"
        required: false
        type: string
      dry_run:
        description: "Don't write to the database"
        required: false
        type: boolean
        default: false
      detail_only:
        description: "Refetch a single listing by id (skips index)"
        required: false
        type: string
      no_image_downloads:
        description: "Skip image download phase"
        required: false
        type: boolean
        default: false
      max_detail_refetches:
        description: "Override listing-refetches-per-run cap (blank = mode default)"
        required: false
        type: string
      max_image_downloads:
        description: "Override images-per-run cap (blank = mode default)"
        required: false
        type: string
      image_workers:
        description: "Override concurrent workers (blank = mode default)"
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.aggressive == true && 350 || 60 }}
    env:
      MODE_MAX_REFETCHES: ${{ inputs.aggressive == true && '10000' || '2000' }}
      MODE_MAX_IMAGES: ${{ inputs.aggressive == true && '10000' || '1000' }}
      MODE_WORKERS: ${{ inputs.aggressive == true && '16' || '8' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.limit }}" ]; then
            ARGS="$ARGS --limit ${{ inputs.limit }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.detail_only }}" ]; then
            ARGS="$ARGS --detail-only ${{ inputs.detail_only }}"
          fi
          if [ "${{ inputs.no_image_downloads }}" = "true" ]; then
            ARGS="$ARGS --no-image-downloads"
          fi

          # Per-input overrides win; otherwise use the mode default.
          MAX_REFETCH="${{ inputs.max_detail_refetches }}"
          if [ -z "$MAX_REFETCH" ]; then
            MAX_REFETCH="$MODE_MAX_REFETCHES"
          fi
          MAX_IMG="${{ inputs.max_image_downloads }}"
          if [ -z "$MAX_IMG" ]; then
            MAX_IMG="$MODE_MAX_IMAGES"
          fi
          WORKERS="${{ inputs.image_workers }}"
          if [ -z "$WORKERS" ]; then
            WORKERS="$MODE_WORKERS"
          fi
          ARGS="$ARGS --max-detail-refetches $MAX_REFETCH"
          ARGS="$ARGS --max-image-downloads $MAX_IMG"
          ARGS="$ARGS --image-workers $WORKERS"

          echo "Running with: $ARGS"
          python -m scraper.main $ARGS
