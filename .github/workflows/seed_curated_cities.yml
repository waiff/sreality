name: "Data: seed curated cities"

# One-shot workflow that geocodes the cities in
# data/obce_v_datech_2025.csv via Mapy.cz, then writes them into
# curated_cities + city_index_definitions + city_index_revisions +
# city_index_values (+ city_population from data/csu_population.json
# when present).
#
# Population source: the official ČSÚ DataStat export "Počet obyvatel
# v obcích k 1. 1.". Download the JSON from
# https://data.csu.gov.cz/datastat/data/VYBER/OBY02AT02 and commit it
# to data/csu_population.json; the seed parses that JSON-stat file,
# matches each municipality to a curated city by (name, kraj), and
# upserts city_population. A legacy data/csu_population_2024.csv is
# still read as a fallback when the JSON is absent.
#
# The geocoded coordinates land in data/curated_cities_geocoded.json
# and are committed back to the branch so subsequent reruns are
# offline-deterministic.
#
# Apply migration 078 before running. Safe to re-run: cities upsert
# by (name, kraj_name), definitions upsert by index_name, every run
# inserts a fresh city_index_revisions row + matching values batch.
#
# Required secrets: SUPABASE_DB_URL, MAPY_CZ_API_KEY (only needed
# when the geocode cache is empty or being expanded).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Plan only — geocode, but skip DB writes
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      commit_geocodes:
        description: Commit data/curated_cities_geocoded.json back to the branch
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      MAPY_CZ_API_KEY: ${{ secrets.MAPY_CZ_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "psycopg[binary]>=3.2" requests

      - name: Run seed
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python -m scripts.seed_curated_cities $ARGS

      - name: Commit geocode cache
        if: ${{ inputs.commit_geocodes == 'true' && inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet data/curated_cities_geocoded.json; then
            echo "No geocode cache changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/curated_cities_geocoded.json
          git commit -m "data: refresh curated_cities geocode cache"
          git push
