name: "Scraping: Sreality condition scoring (batch API)"

# Phase 1.8b — async condition scoring via the Anthropic Message Batches
# API (50% cheaper than the synchronous condition_scores.yml job). Two
# modes, selected by the `mode` input:
#
#   submit  — select pending listings and submit one batch
#             (scripts.submit_condition_batch). Records the batch + its
#             custom_id map in condition_score_batches /
#             condition_score_batch_requests.
#   ingest  — poll in-flight batches; on completion, write each result
#             through persist_scoring_result + one llm_calls row at the
#             50% batch-discounted cost (scripts.ingest_condition_batch).
#             Idempotent and resumable.
#
# Typical lifecycle: run `submit` once, then run `ingest` periodically
# until the batch flips to `ingested` (Anthropic batches usually finish
# within an hour, 24h max).
#
# DISPATCH-ONLY for now. Before enabling a schedule (e.g. an hourly
# `ingest` poll), the operator must apply migration 098 and confirm a
# manual submit→ingest round-trip. To schedule later, add an `on.schedule`
# block; the run step below defaults the scheduled (empty-input) case to
# `ingest`.
#
# Required GitHub secrets: SUPABASE_DB_URL, ANTHROPIC_API_KEY.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "submit a new batch, or ingest completed ones"
        required: true
        default: "ingest"
        type: choice
        options:
          - "ingest"
          - "submit"
      region_ids:
        description: "[submit] Comma-separated locality_region_id list (empty = no filter)"
        required: false
        default: ""
        type: string
      limit:
        description: "[submit] Max listings to put in the batch"
        required: false
        default: "2000"
        type: string
      n_images:
        description: "[submit] Images per listing (0 = text-only, matches production)"
        required: false
        default: "0"
        type: string
      max_age_days:
        description: "[submit] Only listings seen within this many days (0 = no filter)"
        required: false
        default: "30"
        type: string

concurrency:
  group: condition-score-batches
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "psycopg[binary]>=3.2" \
            "requests>=2.32" \
            "boto3>=1.35" \
            "anthropic>=0.40"

      - name: Run batch step
        run: |
          # Scheduled triggers (if added later) pass no inputs; default to ingest.
          MODE="${{ inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="ingest"; fi

          if [ "$MODE" = "submit" ]; then
            REGION='${{ inputs.region_ids }}'
            LIMIT='${{ inputs.limit }}'
            if [ -z "$LIMIT" ]; then LIMIT="2000"; fi
            NIMG='${{ inputs.n_images }}'
            if [ -z "$NIMG" ]; then NIMG="0"; fi
            AGE='${{ inputs.max_age_days }}'
            if [ -z "$AGE" ]; then AGE="30"; fi
            ARGS="--region-ids '$REGION' --limit $LIMIT --n-images $NIMG --max-age-days $AGE"
            echo "submit with: $ARGS"
            eval python -m scripts.submit_condition_batch $ARGS
          else
            echo "ingest in-flight batches"
            python -m scripts.ingest_condition_batch
          fi
