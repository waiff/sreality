name: "Scraping: Sreality condition scoring (batch API)"

# Phase 1.8b — async condition scoring via the Anthropic Message Batches
# API (50% cheaper than the synchronous condition_scores.yml job). Two
# modes, selected by the `mode` input:
#
#   submit  — select pending listings and submit them as one or more
#             size-bounded batches (scripts.submit_condition_batch keeps each
#             chunk under the 256MB Batches API cap). Records every batch +
#             its custom_id map in condition_score_batches /
#             condition_score_batch_requests.
#   ingest  — poll in-flight batches; on completion, write each result
#             through persist_scoring_result + one llm_calls row at the
#             50% batch-discounted cost (scripts.ingest_condition_batch).
#             Idempotent and resumable.
#
# Typical lifecycle: a `submit` run chunks pending listings into batches,
# then `ingest` runs poll until every batch flips to `ingested` (Anthropic
# batches usually finish within an hour, 24h max).
#
# SCHEDULED steady-state condition-scoring driver — replaces the synchronous
# condition_scores.yml cron (now dispatch-only). Two crons, told apart by
# github.event.schedule in the run step:
#   * submit every 3h — put the next slice of unscored listings in a batch.
#   * ingest hourly   — poll in-flight batches and persist completed results.
# Batch billing is 50% of synchronous, and submit resolves the model from
# app_settings.llm_condition_model (Haiku today), so this is ~25% of the
# original Sonnet-sync cost. workflow_dispatch still works for ad-hoc runs.
#
# Required GitHub secrets: SUPABASE_DB_URL, ANTHROPIC_API_KEY.

on:
  schedule:
    - cron: "5 */3 * * *"   # submit: next slice of unscored listings
    - cron: "35 * * * *"    # ingest: poll + persist completed batches
  workflow_dispatch:
    inputs:
      mode:
        description: "submit a new batch, or ingest completed ones"
        required: true
        default: "ingest"
        type: choice
        options:
          - "ingest"
          - "submit"
      region_ids:
        description: "[submit] Comma-separated locality_region_id list (empty = no filter)"
        required: false
        default: ""
        type: string
      limit:
        description: "[submit] Max listings to put in the batch"
        required: false
        default: "2000"
        type: string
      n_images:
        description: "[submit] Images per listing (0 = text-only, matches production)"
        required: false
        default: "0"
        type: string
      max_age_days:
        description: "[submit] Only listings seen within this many days (0 = no filter)"
        required: false
        default: "30"
        type: string

concurrency:
  group: condition-score-batches
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "psycopg[binary]>=3.2" \
            "requests>=2.32" \
            "boto3>=1.35" \
            "anthropic>=0.40"

      - name: Run batch step
        run: |
          # Scheduled triggers pass no inputs; pick mode from which cron fired.
          MODE="${{ inputs.mode }}"
          if [ -z "$MODE" ]; then
            if [ "${{ github.event.schedule }}" = "5 */3 * * *" ]; then
              MODE="submit"
            else
              MODE="ingest"
            fi
          fi

          if [ "$MODE" = "submit" ]; then
            REGION='${{ inputs.region_ids }}'
            LIMIT='${{ inputs.limit }}'
            # Scheduled fallback: 2000 is the last-known-good pre-Jun-4 value.
            # The size-aware chunking inside scripts/submit_condition_batch.py
            # is the real guard against the Batches API 256MB cap (HTTP 413);
            # this limit just keeps each run's build time bounded.
            if [ -z "$LIMIT" ]; then LIMIT="2000"; fi
            NIMG='${{ inputs.n_images }}'
            if [ -z "$NIMG" ]; then NIMG="0"; fi
            AGE='${{ inputs.max_age_days }}'
            if [ -z "$AGE" ]; then AGE="30"; fi
            ARGS="--region-ids '$REGION' --limit $LIMIT --n-images $NIMG --max-age-days $AGE"
            echo "submit with: $ARGS"
            eval python -m scripts.submit_condition_batch $ARGS
          else
            echo "ingest in-flight batches"
            python -m scripts.ingest_condition_batch
          fi
