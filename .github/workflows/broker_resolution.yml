name: Broker resolution (incremental)

# Broker intelligence: the incremental identity resolver. Attributes new
# (unattributed-straggler) + content-changed (dirty_broker_listings) sreality
# listings to their per-source broker_identities, ensures their firms, attaches
# singleton canonical brokers, and recomputes ONLY the affected brokers' rollups +
# firm memberships. O(changes); never refreshes the leaderboard matview (that is
# the daily full sweep's job). Source-agnostic maintenance job, so it carries NO
# `# portal:` tag. Shares the broker-resolution concurrency group with the full
# sweep so the two never mutate the broker tables at once.
#
# Required secret: SUPABASE_DB_URL.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: broker-resolution
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: pip install -e ".[api]"
      - name: Resolve brokers (incremental)
        run: python -m scripts.resolve_brokers --incremental
