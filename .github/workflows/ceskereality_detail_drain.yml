name: "Scraping: Českéreality detail drain"

# portal: ceskereality
# The slow half of the ceskereality cadence split (architectural rule #19, like
# sreality/idnes). Claims a bounded slice of listing_detail_queue
# (source='ceskereality', enqueued by ceskereality_index_walk.yml), fetches each
# listing page on a rate-limited worker pool, parses it to a ScrapedListing, and
# ingests via db.ingest_scraped_listing (Tier-0 idempotency + property singleton).
# The per-listing category is derived from its detail URL. Records run_type='detail'
# (index_pages=0). The drain records image-URL rows; the shared images.yml job
# downloads the bytes to R2.
#
# Bounded by a wall-clock budget (--max-seconds, default 2400 = 40 min, safely under
# the 50-min job timeout) so the run always FINALIZES cleanly — it stops claiming and
# records ended_at rather than being SIGKILLed mid-flight (which would leave a "stuck"
# scrape_run). The queue persists across runs. A gone detail (404 / redirect off the
# .html path) flips that listing inactive + dequeues it.
#
# Hourly cron + SELF-CHAINING (with SCRAPE_CHAIN_TOKEN it re-dispatches itself while the
# queue has work) so the initial ~49k backlog drains near-continuously (~5h) instead of
# 40-min-on/idle hourly slices. Throughput defaults (6 workers, 2 req/s) ride the
# residential proxy (SCRAPER_PROXY_URL) which clears the site's datacenter-IP throttle —
# the index walk runs 2 req/s through it cleanly. Coordinates come from the page, so no
# MAPY_CZ_API_KEY is needed. Required secret: SUPABASE_DB_URL.

on:
  schedule:
    - cron: "50 * * * *"
  workflow_dispatch:
    inputs:
      max_seconds:
        description: wall-clock drain budget, finalizes cleanly before timeout (blank = 2400 = 40 min)
        required: false
        default: ""
        type: string
      max_detail:
        description: hard cap on listings claimed this run (blank = none; the time budget governs)
        required: false
        default: ""
        type: string
      workers:
        description: concurrent detail-fetch workers (blank = 6)
        required: false
        default: ""
        type: string
      rate:
        description: global detail-fetch rate cap, req/s (blank = 2 — the proxy cleared the throttle)
        required: false
        default: ""
        type: string

concurrency:
  group: ceskereality-detail-drain
  cancel-in-progress: false

jobs:
  detail-drain:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run ceskereality detail drain
        id: drain
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SCRAPER_PROXY_URL: ${{ secrets.SCRAPER_PROXY_URL }}
          MAX_SECONDS: ${{ inputs.max_seconds || '2400' }}
          MAX_DETAIL: ${{ inputs.max_detail }}
          WORKERS: ${{ inputs.workers || '6' }}
          RATE: ${{ inputs.rate || '2' }}
        run: |
          ARGS="--drain-only --max-seconds $MAX_SECONDS --workers $WORKERS --rate $RATE"
          if [ -n "$MAX_DETAIL" ]; then ARGS="$ARGS --max-detail $MAX_DETAIL"; fi
          echo "python -m scraper.ceskereality_main $ARGS"
          # Capture python's exit code through the tee pipe + how many listings this run
          # claimed (drives the chain decision), then exit with python's code.
          set +e
          eval "python -m scraper.ceskereality_main $ARGS" 2>&1 | tee /tmp/cr_drain.log
          RC=${PIPESTATUS[0]}
          set -e
          CLAIMED=$(grep -oE 'RUN done .*claimed=[0-9]+' /tmp/cr_drain.log | grep -oE 'claimed=[0-9]+' | tail -1 | cut -d= -f2 || true)
          echo "claimed=${CLAIMED:-0}" >> "$GITHUB_OUTPUT"
          exit $RC

      # Re-dispatch back-to-back only while there's work, so the initial ~49k backlog
      # drains continuously (~5h at 2 req/s) instead of 40 min on / ~80 min idle per
      # hourly cron. Empty queue -> claimed=0 -> no chain; the hourly cron restarts it
      # when the next index walk enqueues work.
      - name: Chain next run (near-continuous)
        if: ${{ success() && steps.drain.outputs.claimed != '0' && steps.drain.outputs.claimed != '' }}
        env:
          CHAIN_TOKEN: ${{ secrets.SCRAPE_CHAIN_TOKEN }}
        run: |
          if [ -z "$CHAIN_TOKEN" ]; then
            echo "SCRAPE_CHAIN_TOKEN not set — ceskereality drain stays cron-driven (hourly)."
            exit 0
          fi
          echo "Re-dispatching ceskereality_detail_drain.yml (claimed=${{ steps.drain.outputs.claimed }} > 0)."
          curl -sS -X POST \
            -H "Authorization: Bearer $CHAIN_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/ceskereality_detail_drain.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"
