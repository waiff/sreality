name: "CI: tests"

# CI test suite, runs on every push and pull request. Two parallel jobs:
# a Python job (verifies the filter-registry and workflow-docs codegen are
# fresh, then runs pytest) and a frontend job (TypeScript type-check + vitest
# pure-function tests). This is the build gate for every branch.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e ".[dev,api,geo]"

      - name: Check filter registry codegen is fresh
        run: python scripts/generate_filter_registry.py --check

      - name: Check workflow docs codegen is fresh
        run: python scripts/generate_workflow_docs.py --check

      - name: Run pytest
        run: pytest -q

  vitest:
    # Frontend pure-function tests (vite/vitest, no jsdom yet).
    # Covers filter state plumbing, the registry adapter, and the
    # centre+radius spatial helpers in lib/queries.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run vitest
        working-directory: frontend
        run: npm test
