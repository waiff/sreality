name: "Scraping: Sreality full index walk (primary, ~hourly)"

# Primary scrape. Each run walks the COMPLETE index of all six category
# pairs, so:
#   - newly-listed properties surface (and downstream in the Watchdog
#     feed), and
#   - delisted properties flip to is_active=false — a complete walk is
#     what makes that inference valid (architectural rule #3).
#
# CADENCE REALITY: the cron is */15, but GitHub throttles scheduled
# workflows heavily (best-effort, worse overnight), and each run takes
# 10-16 min, so the real cadence is ~hourly, NOT every 15 min. That is a
# GitHub platform limit, not a bug. For tighter cadence configure the
# optional SCRAPE_CHAIN_TOKEN PAT (see the "Chain next run" step below);
# otherwise accept ~hourly. The Health liveness check is tuned to this
# reality (warn >90 min, fail >180 min).
#
# Because the walk is complete (no --limit), mark_inactive runs every
# tick. scraper/main.py guards each per-category flip on walk
# completeness (collected vs the API's result_size), so a silently
# truncated index page never mass-flips live listings. A gone detail
# fetch (404/410 or sreality's "page does not exist" body) flips that
# single listing immediately instead of accumulating fetch failures.
#
# Detail refetches and image downloads are CAPPED per tick so a run
# stays bounded; whatever the cap defers drains on the next tick
# (failure-priority retry + newest-first image ordering). Condition
# scoring (LLM cost) is left to the thin nightly scrape.yml, which also
# does a deep image-backlog drain and a high-cap detail catch-up.
#
# Recorded as run_type='delta' (via --run-type) so the Health page
# keeps these frequent ticks distinct from the nightly 'full' run, even
# though both now do a complete index walk.
#
# Concurrency: cancel-in-progress=false so a long tick is never killed
# mid-walk; the next cron tick queues behind it instead of overlapping.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: sreality-delta-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run delta scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          # Full index walk (no --limit) so mark_inactive + gone
          # detection cover every category each tick. Detail refetches
          # and images are capped so a tick stays bounded; deferred work
          # drains on the next tick. Condition scoring is the nightly's
          # job. Recorded as run_type='delta' (see header).
          python -m scraper.main \
            --run-type delta \
            --no-condition-scoring \
            --max-detail-refetches 150 \
            --max-detail-refetches-per-category 60 \
            --detail-workers 4 \
            --detail-rate 2.0 \
            --max-image-downloads 400 \
            --image-workers 16

      # GitHub throttles the */15 schedule to ~hourly (worse overnight), so
      # the real cadence is far slower than 15 min. OPTIONAL tighter cadence:
      # if a chain PAT is configured, re-dispatch this workflow on success for
      # back-to-back runs (~every run-duration, 15-18 min). The */15 cron stays
      # the safety net that restarts the chain if a run fails or the PAT is
      # absent. GITHUB_TOKEN cannot re-trigger a workflow (GitHub blocks
      # recursion), so this needs a separate PAT secret SCRAPE_CHAIN_TOKEN
      # (fine-grained: this repo, Actions: read+write). No-op without it.
      - name: Chain next run (optional, tighter cadence)
        if: ${{ success() }}
        env:
          CHAIN_TOKEN: ${{ secrets.SCRAPE_CHAIN_TOKEN }}
        run: |
          if [ -z "$CHAIN_TOKEN" ]; then
            echo "SCRAPE_CHAIN_TOKEN not set — cadence stays cron-driven (~hourly)."
            exit 0
          fi
          echo "Re-dispatching scrape_delta.yml for tighter cadence."
          curl -sS -X POST \
            -H "Authorization: Bearer $CHAIN_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/scrape_delta.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"
