name: Sreality delta scrape (15-min)

# Lightweight companion to scrape.yml (nightly full walk). Walks the
# first ~3 index pages of each of the 6 category pairs every 15
# minutes so a newly-listed property surfaces in the database — and
# downstream in the Watchdog feed — within minutes instead of within
# a day.
#
# Architectural rule #3 ("Never delete listings") still holds: the
# scraper skips its `mark_inactive` step whenever `--limit` is set
# (see scraper/main.py around the conn-not-None / limit-is-None
# guard), so a partial walk can never falsely flip a still-live
# listing to is_active=false. That inference remains the nightly
# scrape's job.
#
# Image-download and condition-scoring phases are explicitly skipped
# here — they're materially the most expensive parts of a run and
# the nightly already covers them. The delta still records image
# URLs and snapshot rows for new/updated listings.
#
# Concurrency: a long-running delta blocks the next 15-min tick
# instead of overlapping. Skipping is preferable to two scrapers
# stomping each other.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: sreality-delta-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run delta scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          # --limit 200 caps the per-category index walk (see
          # _walk_category in scraper/main.py); with 6 categories
          # that's at most 1200 listings touched per tick, of which
          # only new/changed listings trigger a detail fetch.
          python -m scraper.main \
            --limit 200 \
            --no-image-downloads \
            --no-condition-scoring \
            --max-detail-refetches 200 \
            --max-detail-refetches-per-category 100
