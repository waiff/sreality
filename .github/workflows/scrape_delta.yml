name: Sreality scrape (15-min full walk)

# Primary scrape. Every 15 minutes it walks the COMPLETE index of all
# six category pairs, so:
#   - newly-listed properties surface within minutes (and downstream
#     in the Watchdog feed), and
#   - delisted properties flip to is_active=false within minutes too —
#     a complete walk is what makes that inference valid
#     (architectural rule #3).
#
# Because the walk is complete (no --limit), mark_inactive runs every
# tick. scraper/main.py guards each per-category flip on walk
# completeness (collected vs the API's result_size), so a silently
# truncated index page never mass-flips live listings. A gone detail
# fetch (404/410 or sreality's "page does not exist" body) flips that
# single listing immediately instead of accumulating fetch failures.
#
# Detail refetches and image downloads are CAPPED per tick so a run
# stays bounded; whatever the cap defers drains on the next tick
# (failure-priority retry + newest-first image ordering). Condition
# scoring (LLM cost) is left to the thin nightly scrape.yml, which also
# does a deep image-backlog drain and a high-cap detail catch-up.
#
# Recorded as run_type='delta' (via --run-type) so the Health page
# keeps these frequent ticks distinct from the nightly 'full' run, even
# though both now do a complete index walk.
#
# Concurrency: cancel-in-progress=false so a long tick is never killed
# mid-walk; the next cron tick queues behind it instead of overlapping.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: sreality-delta-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run delta scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          # Full index walk (no --limit) so mark_inactive + gone
          # detection cover every category each tick. Detail refetches
          # and images are capped so a tick stays bounded; deferred work
          # drains on the next tick. Condition scoring is the nightly's
          # job. Recorded as run_type='delta' (see header).
          python -m scraper.main \
            --run-type delta \
            --no-condition-scoring \
            --max-detail-refetches 150 \
            --max-detail-refetches-per-category 60 \
            --detail-workers 4 \
            --detail-rate 2.0 \
            --max-image-downloads 400 \
            --image-workers 16
