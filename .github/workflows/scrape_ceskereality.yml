name: "Scraping: Českéreality scraper (pilot, dispatch-only)"

# DISPATCH-ONLY scraper for ceskereality.cz on the shared portal framework.
# ceskereality is a structured HTML portal (like idnes): the index walk pages the
# search results and enqueues new/price-changed ids into listing_detail_queue,
# then the detail drain fetches each listing page, parses it to a ScrapedListing,
# and ingests through db.ingest_scraped_listing (Tier-0 idempotency + Tier-1
# property matching). One job runs both phases via ceskereality_main.
#
# NO schedule yet — the site disallows generic bots in robots.txt, so this lands
# manual-only for an initial validation run (-f max_pages=2 does a tiny partial
# walk that suppresses mark_inactive). To promote it to a scheduled pilot, add a
# `schedule:` cron here (e.g. "5 */6 * * *", offset off the other scrapers) and
# regenerate workflowDocs.
#
# Categories live in the `portals` registry row (migration 116), not here, so
# coverage is tuned with a SQL update, no workflow edit. A full run (blank
# max_pages) is provable-complete (result total, no deep-pagination cap), so the
# runner marks delisted listings inactive under the completeness guard —
# source-scoped to ceskereality rows only.
#
# Writes 'index' + 'detail' scrape_runs rows under source='ceskereality' (its own
# Health-page lane). Coordinates come from the page, so no MAPY_CZ_API_KEY is
# needed. Required secret: SUPABASE_DB_URL.

on:
  workflow_dispatch:
    inputs:
      max_pages:
        description: cap index pages per category (ad-hoc partial; suppresses mark_inactive). Blank = full walk.
        required: false
        default: ""
        type: string
      max_detail:
        description: cap detail-drain claims this run
        required: false
        default: "1500"
        type: string
      rate:
        description: detail-fetch requests/second ceiling (keep polite)
        required: false
        default: "0.7"
        type: string
      workers:
        description: detail-fetch workers (concurrency)
        required: false
        default: "2"
        type: string

concurrency:
  group: ceskereality-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run ceskereality scrape
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MAX_PAGES: ${{ inputs.max_pages }}
          MAX_DETAIL: ${{ inputs.max_detail || '1500' }}
          RATE: ${{ inputs.rate || '0.7' }}
          WORKERS: ${{ inputs.workers || '2' }}
        run: |
          ARGS="--max-detail $MAX_DETAIL --rate $RATE --workers $WORKERS"
          if [ -n "$MAX_PAGES" ]; then ARGS="$ARGS --max-pages $MAX_PAGES"; fi
          echo "python -m scraper.ceskereality_main $ARGS"
          eval "python -m scraper.ceskereality_main $ARGS"
