name: "Scraping: Českéreality scraper (pilot)"

# portal: ceskereality

# Scraper for ceskereality.cz on the shared portal framework.
# ceskereality is a structured HTML portal (like idnes): the index walk pages the
# search results and enqueues new/price-changed ids into listing_detail_queue,
# then the detail drain fetches each listing page, parses it to a ScrapedListing,
# and ingests through db.ingest_scraped_listing (Tier-0 idempotency + property
# singleton). One job runs both phases via ceskereality_main. The client crawls
# with an honest, identifying User-Agent at a polite rate (the site disallows
# generic bots in robots.txt).
#
# VALIDATE-FIRST rollout (operator-chosen): ships DISPATCH-ONLY so the first run
# is a manual `-f max_pages=2` validation (a tiny partial walk that suppresses
# mark_inactive) that confirms the runners aren't anti-bot-blocked (the mmreality
# posture) and the parser yields clean rows. Once that's green, ENABLE the 6h
# scheduled pilot by uncommenting the `schedule:` block below and regenerating
# workflowDocs.
#
# Categories live in the `portals` registry row (migration 249), not here, so
# coverage is tuned with a SQL update, no workflow edit. A full run (blank
# max_pages) is provable-complete (result total, no deep-pagination cap), so the
# runner marks delisted listings inactive under the completeness guard —
# source-scoped to ceskereality rows only.
#
# Writes 'index' + 'detail' scrape_runs rows under source='ceskereality' (its own
# Health-page lane). Coordinates come from the page, so no MAPY_CZ_API_KEY is
# needed. Required secret: SUPABASE_DB_URL.

on:
  # Enable the scheduled pilot after the validation run is green:
  # schedule:
  #   - cron: "5 */6 * * *"   # every 6h, offset off the other scrapers
  workflow_dispatch:
    inputs:
      max_pages:
        description: cap index pages per category (ad-hoc partial; suppresses mark_inactive). Blank = full walk.
        required: false
        default: ""
        type: string
      max_detail:
        description: cap detail-drain claims this run
        required: false
        default: "1500"
        type: string
      rate:
        description: detail-fetch requests/second ceiling (keep polite)
        required: false
        default: "0.7"
        type: string
      workers:
        description: detail-fetch workers (concurrency)
        required: false
        default: "2"
        type: string

concurrency:
  group: ceskereality-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run ceskereality scrape
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          MAX_PAGES: ${{ inputs.max_pages }}
          MAX_DETAIL: ${{ inputs.max_detail || '1500' }}
          RATE: ${{ inputs.rate || '0.7' }}
          WORKERS: ${{ inputs.workers || '2' }}
        run: |
          ARGS="--max-detail $MAX_DETAIL --rate $RATE --workers $WORKERS"
          if [ -n "$MAX_PAGES" ]; then ARGS="$ARGS --max-pages $MAX_PAGES"; fi
          echo "python -m scraper.ceskereality_main $ARGS"
          eval "python -m scraper.ceskereality_main $ARGS"
