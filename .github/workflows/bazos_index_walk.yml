name: "Scraping: Bazos index walk"

# portal: bazos
# The fast half of the bazos cadence split (architectural rule #19, like
# sreality/idnes). Walks the ENTIRE index of every configured scope (no
# --max-pages), touch_listings bumps last_seen on still-listed ads, mark_inactive
# flips delisted ones under the completeness guard (source-scoped, throttled to
# once per 12h), and new/price-changed ids are enqueued into listing_detail_queue
# (source='bazos'). No detail fetch — the drain (bazos_detail_drain.yml) consumes
# the queue. Records run_type='index'.
#
# WHY split: bazos now walks 14 nationwide scopes (byt/dum/chata/restaurace/
# kancelar/prostory/sklad × prodam/pronajmu ≈ 1500 index pages, ~50 min). A
# combined index+detail run can't do both inside one job — the full index eats
# the whole window, so the detail drain never runs and the queue grows unbounded.
# Splitting lets the index complete every cycle (active counts + delistings stay
# accurate) while the drain chips the backlog on its own bounded cadence.
#
# Scopes live in the `portals` registry row; coverage is tuned with a SQL update,
# no workflow edit. The index walk needs no geocoding (that happens in the drain),
# so no MAPY_CZ_API_KEY here. Required secret: SUPABASE_DB_URL. workflow_dispatch
# can narrow to one scope (--sale-type + --category) or a region (locality+radius).

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      sale_type:
        description: prodam (sale) or pronajmu (rent); blank = every configured scope
        required: false
        default: ""
        type: choice
        options: ["", prodam, pronajmu]
      category:
        description: bazos category segment; blank = every configured scope
        required: false
        default: ""
        type: choice
        options: ["", byt, dum, chata, restaurace, kancelar, prostory, sklad]
      locality:
        description: locality filter (e.g. Praha); blank = nationwide
        required: false
        default: ""
        type: string
      radius_km:
        description: radius around locality in km (blank = none)
        required: false
        default: ""
        type: string
      max_pages:
        description: cap index pages per scope (ad-hoc partial; suppresses mark_inactive). Blank = full walk.
        required: false
        default: ""
        type: string

concurrency:
  group: bazos-index-walk
  cancel-in-progress: false

jobs:
  index-walk:
    runs-on: ubuntu-latest
    # The full 14-scope walk is ~1500 pages at the portal's index rate (~50 min
    # observed); the headroom keeps it under the 90-min stuck-run cutoff.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Run bazos index walk
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          # inputs.* are empty on a scheduled run → walk EVERY scope in the
          # portal registry; a dispatch can narrow to one scope / region.
          SALE_TYPE: ${{ inputs.sale_type }}
          CATEGORY: ${{ inputs.category }}
          LOCALITY: ${{ inputs.locality }}
          RADIUS_KM: ${{ inputs.radius_km }}
          MAX_PAGES: ${{ inputs.max_pages }}
        run: |
          ARGS="--index-only"
          if [ -n "$SALE_TYPE" ]; then ARGS="$ARGS --sale-type $SALE_TYPE"; fi
          if [ -n "$CATEGORY" ]; then ARGS="$ARGS --category $CATEGORY"; fi
          if [ -n "$LOCALITY" ]; then ARGS="$ARGS --locality '$LOCALITY'"; fi
          if [ -n "$RADIUS_KM" ]; then ARGS="$ARGS --radius-km $RADIUS_KM"; fi
          if [ -n "$MAX_PAGES" ]; then ARGS="$ARGS --max-pages $MAX_PAGES"; fi
          echo "python -m scraper.bazos_main $ARGS"
          eval "python -m scraper.bazos_main $ARGS"
