name: Backfill image render_score (one-shot, from stored embeddings)

# One-shot corrective for migration 239: the clip_tag backfill skips already-tagged
# images, so images tagged before the render axis shipped have render_score NULL (the
# listing-detail render badge is hidden and the byt render exclusion is inert on them).
# This re-scores the render-vs-photo axis from each image's STORED CLIP embedding — no R2
# download, no image re-inference — so it is fast (vector dot products). Horizontally
# sharded into 4 jobs (image_id %% 4). Resumable + idempotent (a scored row drops out of
# the render_score-IS-NULL partial index, migration 240). Dispatch-only. Secret:
# SUPABASE_DB_URL (no R2 needed). NOT a portal ingest (portal: null).

on:
  workflow_dispatch:
    inputs:
      max_seconds:
        description: Per-shard wall-clock budget
        required: false
        default: "3000"
        type: string
      limit:
        description: Per-shard cap (0 = until time budget)
        required: false
        default: "0"
        type: string

jobs:
  backfill:
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      HF_HUB_DOWNLOAD_TIMEOUT: "60"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Cache Hugging Face weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-clip-vit-b32

      - name: Install (CPU torch + clip extra)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[clip]"

      - name: Backfill render_score (shard ${{ matrix.shard }}/4)
        run: |
          python -m scripts.backfill_render_score \
            --shards 4 --shard ${{ matrix.shard }} \
            --max-seconds "${{ inputs.max_seconds || '3000' }}" \
            --limit "${{ inputs.limit || '0' }}"
