name: "Scraping: Bazos description enrichment (LLM, every 6h + manual)"

# Decoupled enrichment job. bazos listings carry no structured floor /
# amenities / condition / building_type / energy — only price, area,
# disposition, coords, and the seller's free text. This reads the description
# of active listings whose latest snapshot isn't yet enriched, extracts those
# typed fields with a cheap model (Haiku 4.5), caches the extraction in
# listing_description_enrichments, and fills ONLY the currently-NULL listings
# columns (the deterministic HTML-parsed price/area/disposition are never
# overwritten). Resumable: enriched snapshots drop out of the next selection.
#
# Runs on two triggers:
#   * schedule (every 6h, matching the bazos scrape cadence) — steady-state
#     driver, decoupled from the scrape so the LLM phase never slows it.
#   * workflow_dispatch — manual backfill / re-run with overrides.
#
# Bounded two ways, whichever comes first: max_cost_usd (LLM spend) and
# max_seconds (wall clock). On either cap the script logs the reason and exits 0
# with the rows done so far kept; the next cron tick resumes from where it left
# off (the selection skips already-enriched snapshots). max_seconds is set below
# the job timeout-minutes so a run FINALIZES CLEANLY instead of being cancelled
# mid-flight at the timeout. The selection is portal-generic (predicate over
# listings/listing_snapshots) — point --source at another description-only portal.
#
# Concurrency group bazos-enrichment, cancel-in-progress=false: the next tick
# queues behind a still-running one rather than killing it.
#
# Required GitHub secrets:
#   SUPABASE_DB_URL   — same one used by every other workflow
#   ANTHROPIC_API_KEY — Haiku 4.5 by default (--model overrides)

on:
  schedule:
    # Every 3h (was 6h) to drain the standing enrichment backlog (~16k pending): each run
    # is wall-clock-bounded (~50min) far below the $20 cost cap, so throughput is
    # runs-per-day-limited, not cost-limited. 8 runs/day ≈ doubles coverage, netting the
    # backlog down in ~2-3 days while keeping up with ~2k new/day; steady-state keeps
    # bazos attributes fresher. Revert to */6 if it ever over-serves.
    - cron: "20 */3 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: Portal source to enrich (description-only portals)
        required: true
        default: "bazos"
        type: string
      limit:
        description: Max listings selected this run (the wall-clock budget usually stops it first)
        required: true
        default: "3000"
        type: string
      max_cost_usd:
        description: Stop early when this run's LLM cost exceeds this cap (USD)
        required: true
        default: "20"
        type: string
      max_seconds:
        description: Wall-clock budget; finalize cleanly when reached (keep below timeout-minutes)
        required: true
        default: "3000"
        type: string
      model:
        description: Anthropic model id (blank = claude-haiku-4-5)
        required: false
        default: ""
        type: string
      dry_run:
        description: Count pending listings and exit without calling the LLM
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: bazos-enrichment
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: read
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api]"

      - name: Run bazos description enrichment
        run: |
          SOURCE='${{ inputs.source }}'
          if [ -z "$SOURCE" ]; then SOURCE="bazos"; fi
          LIMIT='${{ inputs.limit }}'
          if [ -z "$LIMIT" ]; then LIMIT="3000"; fi
          COST='${{ inputs.max_cost_usd }}'
          if [ -z "$COST" ]; then COST="20"; fi
          SECS='${{ inputs.max_seconds }}'
          if [ -z "$SECS" ]; then SECS="3000"; fi
          ARGS="--source $SOURCE --limit $LIMIT --max-cost-usd $COST --max-seconds $SECS"
          if [ -n "${{ inputs.model }}" ]; then ARGS="$ARGS --model ${{ inputs.model }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "Running with: $ARGS"
          eval python -m scripts.enrich_listing_descriptions $ARGS
